<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F4EF;--surf:#fff;--surf2:#EFECE6;
  --brd:#DDD9D0;--brd2:#C4BEB5;
  --tx:#1A1816;--mu:#6E6860;--fa:#B0A89E;
  --blue:#1A5CA8;--bluebg:#E8F0FB;
  --green:#0D6B4A;--greenbg:#DDF3EA;
  --amber:#9E600A;--amberbg:#FDF2DC;
  --red:#B33030;--redbg:#FAE8E8;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --shm:0 4px 20px rgba(0,0,0,0.13);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;min-height:100vh}
.wrap{max-width:940px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:.75rem;flex-wrap:wrap}
.logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);letter-spacing:.1em;cursor:pointer}
.logo:hover{color:var(--tx)}
.nav-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--surf);color:var(--tx);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--brd2)}
.btn.pri{background:var(--tx);color:#fff;border-color:var(--tx)}
.btn.pri:hover{opacity:.87}
.btn.sml{padding:4px 10px;font-size:12px}
.btn.ghost{background:none;color:var(--mu)}
.btn.ghost:hover{color:var(--tx)}
.btn.del{background:none;border:none;color:var(--fa);padding:2px 6px;font-size:13px}
.btn.del:hover{color:var(--red)}
.btn.edt{background:none;border:none;color:var(--mu);padding:2px 8px;font-size:13px}
.btn.edt:hover{color:var(--tx)}
.btn:disabled{opacity:.4;cursor:default}
/* HOME */
.home-ttl{font-size:28px;font-weight:600;margin-bottom:.25rem}
.home-sub{font-size:14px;color:var(--mu);margin-bottom:1.75rem}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tcard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1.25rem 1.5rem;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.tcard:hover{border-color:var(--brd2);transform:translateY(-1px);box-shadow:var(--shm)}
.tcard.past{opacity:.55}
.tc-dest{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-family:'DM Mono',monospace}
.tc-name{font-size:16px;font-weight:600;margin-bottom:.25rem}
.tc-dates{font-size:12px;color:var(--mu);margin-bottom:.875rem}
.tc-foot{display:flex;justify-content:space-between;align-items:center}
.tc-chip{font-size:11px;padding:2px 10px;border-radius:100px;background:var(--surf2);color:var(--mu);border:1px solid var(--brd)}
.tc-cd{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.ncard{border:1px dashed var(--brd2);border-radius:var(--r);padding:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;color:var(--mu);min-height:120px;transition:all .15s}
.ncard:hover{border-color:var(--tx);color:var(--tx)}
/* HEADER */
.hdr{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1.5rem 1.75rem;margin-bottom:1rem;box-shadow:var(--sh)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.dest-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-family:'DM Mono',monospace}
.trip-name{font-size:22px;font-weight:600;line-height:1.2}
.trip-meta{font-size:12px;color:var(--mu);margin-top:4px}
.cdown{text-align:right;flex-shrink:0}
.cdown-n{font-size:40px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.cdown-l{font-size:10px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.travelers{display:flex;gap:5px;margin-top:.875rem;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 11px;background:var(--surf2);border:1px solid var(--brd);border-radius:100px;color:var(--mu)}
/* SYNC */
.sync-lbl{font-size:11px;font-family:'DM Mono',monospace}
.sync-ok{color:var(--green)}
.sync-err{color:var(--red)}
.sync-go{color:var(--amber)}
/* SUMMARY */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.875rem 1.125rem;box-shadow:var(--sh)}
.sc-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'DM Mono',monospace}
.sc-n{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.sc-s{font-size:11px;color:var(--mu);margin-top:1px}
.pbar{height:4px;background:var(--surf2);border-radius:100px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:var(--tx);border-radius:100px;transition:width .4s}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:1.25rem}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:.625rem 1.25rem;font-size:13px;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:-1px;transition:all .15s}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:500}
.tab:hover:not(.on){color:var(--tx)}
/* DAY PICKER */
.dpick{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:1rem;scrollbar-width:none}
.dpick::-webkit-scrollbar{display:none}
.dbt{flex-shrink:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:9px 13px;cursor:pointer;text-align:center;min-width:62px;transition:all .15s}
.dbt:hover{border-color:var(--brd2)}
.dbt.on{background:var(--tx);border-color:var(--tx)}
.dbt .wd{font-size:10px;text-transform:uppercase;color:var(--mu);margin-bottom:2px;font-family:'DM Mono',monospace}
.dbt .dd{font-size:19px;font-weight:600;line-height:1;color:var(--tx)}
.dbt .mo{font-size:10px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.dbt.on .wd,.dbt.on .dd,.dbt.on .mo{color:#fff}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--brd);margin:4px auto 0}
.dbt.on .ddot{background:rgba(255,255,255,.45)}
/* SECTION */
.sech{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.sech-t{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
/* FORM */
.fbox{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:1rem 1.125rem;margin-bottom:1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ff{grid-column:1/-1}
.fl{font-size:10px;color:var(--mu);display:block;margin-bottom:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--surf);color:var(--tx);width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--tx)}
textarea{resize:vertical}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--tx);flex-shrink:0}
.fa{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
/* EVENTS */
.evlist{display:flex;flex-direction:column;gap:7px}
.ev{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh)}
.ev-main{display:flex;gap:12px;padding:.875rem 1.125rem}
.ev-edit{padding:.875rem 1.125rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--r) var(--r)}
.ev-time{font-size:12px;font-weight:500;min-width:40px;text-align:right;font-family:'DM Mono',monospace;padding-top:2px;color:var(--mu)}
.ev-bar{width:3px;border-radius:4px;flex-shrink:0;align-self:stretch;min-height:20px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500;margin-bottom:2px}
.ev-loc{font-size:12px;color:var(--mu)}
.ev-note{font-size:12px;color:var(--mu);margin-top:4px;line-height:1.5;font-style:italic}
.ev-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap}
.ev-cost{font-size:12px;color:var(--mu);font-family:'DM Mono',monospace}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;margin-top:4px;background:var(--bluebg);padding:2px 9px;border-radius:100px;border:1px solid #C5D9F2;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill:hover{opacity:.8}
.empty{text-align:center;padding:3rem 1rem;color:var(--fa);font-size:13px;line-height:2.2}
/* BUDGET */
.bsum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.bcat{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.75rem 1rem;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
.bcat-n{font-size:11px;color:var(--mu);margin-bottom:1px;font-family:'DM Mono',monospace}
.bcat-c{font-size:10px;color:var(--fa)}
.bcat-u{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.bcat-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.bg-t{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .4rem;font-family:'DM Mono',monospace}
.bi{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:4px;border-left:3px solid transparent}
.bi-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.bi-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.bi-d{font-size:13px}
.bi-dates{font-size:11px;color:var(--mu);margin-top:1px;font-family:'DM Mono',monospace}
.bi-cancel{font-size:11px;color:var(--amber);margin-top:1px}
.bi-a{text-align:right;flex-shrink:0}
.bi-u{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.bi-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.btotal{border-top:1px solid var(--brd);padding-top:1rem;margin-top:1rem;display:flex;justify-content:space-between;align-items:center}
/* CHECKLIST */
.ck-g{margin-bottom:1.25rem}
.ck-gt{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;display:flex;justify-content:space-between;font-family:'DM Mono',monospace}
.ck-i{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:3px}
.ck-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.ck-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.ck-tx{flex:1;font-size:13px}
.ck-done{color:var(--fa);text-decoration:line-through}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,18,16,.5);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:2rem 1rem;overflow-y:auto}
.modal{background:var(--surf);border-radius:14px;padding:2rem 2.25rem;max-width:540px;width:100%;box-shadow:var(--shm)}
.modal-t{font-size:18px;font-weight:600;margin-bottom:.25rem}
.modal-s{font-size:13px;color:var(--mu);margin-bottom:1.5rem}
.wdots{display:flex;gap:5px;margin-bottom:1.5rem}
.wdot{height:4px;flex:1;border-radius:100px;background:var(--surf2)}
.wdot.on{background:var(--tx)}
.wlbl{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.mftr{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--brd)}
.fgf{margin-bottom:.875rem}
.tv-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.tv-row{display:flex;gap:6px;align-items:center}
.tv-row input{flex:1}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;font-size:12px;padding:8px 20px;border-radius:100px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;font-family:'DM Mono',monospace;box-shadow:var(--shm)}
.toast.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid #ccc;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@media(max-width:620px){
  .sgrid,.bsum{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .hdr-top,.nav{flex-direction:column}
  .cdown{text-align:left}
  .tgrid{grid-template-columns:1fr}
}
</style>
</head>

function T(){return trips.find(function(t){return t.id===actId;})||null;}
function uid(){return "x"+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function nf(n,d){return (+n||0).toLocaleString("es-ES",{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function isUrl(s){try{var u=new URL(s);return u.protocol==="http:"||u.protocol==="https:";}catch(e){return false;}}
function host(s){try{return new URL(s).hostname.replace(/^www\./,"");}catch(e){return"Link";}}
function fmt(d,o){try{return new Date(d+"T00:00:00").toLocaleDateString("es-ES",o);}catch(e){return d||"";}}
function dArr(s,e){var a=[],c=new Date(s+"T00:00:00"),en=new Date(e+"T00:00:00");while(c<=en){a.push(c.toISOString().split("T")[0]);c.setDate(c.getDate()+1);}return a;}
function fday(d){var dt=new Date(d+"T00:00:00");return{d:dt.getDate(),wd:dt.toLocaleDateString("es-ES",{weekday:"short"}),mo:dt.toLocaleDateString("es-ES",{month:"short"})};}
function nn(ci,co){try{return Math.round((new Date(co+"T00:00:00")-new Date(ci+"T00:00:00"))/86400000);}catch(e){return 0;}}
function toast(msg,dur){var el=document.getElementById("toast");el.textContent=msg;el.className="toast show";setTimeout(function(){el.className="toast";},dur||2800);}
function csym(){var t=T();return t?t.csym||"$":"$";}
function cbase(){var t=T();return t?t.exBase||"EUR":"EUR";}

// AUTO-SYNC: fires 3s after any save()
function save(){
  localStorage.setItem("tp6_trips",JSON.stringify(trips));
  localStorage.setItem("tp6_id",actId||"");
  if(!SCRIPT_URL)return;
  clearTimeout(syncT);
  syncSt="pending";
  syncT=setTimeout(doSync,3000);
}
function doSync(){
  var t=T();if(!t)return;
  syncSt="syncing";render();
  var rec=[];
  t.events.forEach(function(e){rec.push({id:e.id,type:"event",day:e.day,time:e.time,title:e.title,cat:e.cat,location:e.location||"",note:e.note||"",cost:e.cost||0,url:e.url||""});});
  t.budget.forEach(function(b){rec.push({id:b.id,type:"budget",cat:b.cat,desc:b.desc,amt:b.amt||0,cin:b.cin||"",cout:b.cout||"",cancel:b.cancel||"",url:b.url||""});});
  t.checklist.forEach(function(c){rec.push({id:c.id,type:"checklist",grp:c.grp,text:c.text,done:c.done||false,url:c.url||""});});
  var body=JSON.stringify({action:"sync_all",records:rec});
  // no-cors avoids preflight; we confirm after 4s
  var timer=setTimeout(function(){syncSt="ok";lastSync=new Date().toLocaleTimeString("es-ES");localStorage.setItem("tp6_ls",lastSync);render();},4500);
  fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:body})
    .catch(function(){clearTimeout(timer);syncSt="err";render();});
}

// RENDER
function render(){
  if(!actId){rHome();return;}
  var t=T();if(!t){actId=null;rHome();return;}
  var dd=dArr(t.startDate,t.endDate);
  if(!selDay||dd.indexOf(selDay)<0)selDay=t.startDate;
  var devs=t.events.filter(function(e){return e.day===selDay;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var totAmt=t.budget.reduce(function(s,b){return s+(+b.amt||0);},0);
  var totAlt=totAmt/(t.exRate||1);
  var bycat={};Object.keys(BCAT).forEach(function(k){bycat[k]=t.budget.filter(function(b){return b.cat===k;});});
  var ckDone=t.checklist.filter(function(c){return c.done;}).length;
  var pct=t.checklist.length?Math.round(ckDone/t.checklist.length*100):0;
  var grps=[];t.checklist.forEach(function(c){if(grps.indexOf(c.grp)<0)grps.push(c.grp);});
  var today=new Date();today.setHours(0,0,0,0);
  var dL=Math.ceil((new Date(t.startDate+"T00:00:00")-today)/86400000);

  var syncHtml="";
  if(syncSt==="syncing"||syncSt==="pending") syncHtml='<span class="sync-lbl sync-go"><span class="spin"></span> Guardando...</span>';
  else if(syncSt==="ok") syncHtml='<span class="sync-lbl sync-ok">&#10003; '+esc(lastSync)+'</span>';
  else if(syncSt==="err") syncHtml='<span class="sync-lbl sync-err">&#10007; Error sync</span>';

  var h="";
  h+='<div class="nav"><span class="logo" onclick="goHome()">&#9992; TRAVEL PLANNER</span>';
  h+='<div class="nav-r">'+syncHtml;
  h+='<button class="btn ghost sml" onclick="openSet()">&#9881; Editar viaje</button>';
  h+='<button class="btn sml" onclick="goHome()">&#8592; Viajes</button></div></div>';

  h+='<div class="hdr"><div class="hdr-top"><div>';
  h+='<div class="dest-lbl">'+esc(t.destination)+'</div>';
  h+='<div class="trip-name">'+esc(t.name)+'</div>';
  h+='<div class="trip-meta">'+fmt(t.startDate,{day:"numeric",month:"long"})+'&mdash;'+fmt(t.endDate,{day:"numeric",month:"long",year:"numeric"})+'&nbsp;&middot;&nbsp;'+dd.length+' días&nbsp;&middot;&nbsp;'+t.travelers.length+' viajero'+(t.travelers.length!==1?"s":"")+'</div>';
  h+='</div><div class="cdown"><div class="cdown-n">'+(dL>0?dL:dL===0?"HOY":"&#9992;")+'</div><div class="cdown-l">'+(dL>0?"días":dL===0?"Hoy":"En curso")+'</div></div></div>';
  h+='<div class="travelers">'; t.travelers.forEach(function(v){h+='<span class="chip">'+esc(v)+'</span>'; }); h+='</div></div>';

  h+='<div class="sgrid">';
  h+='<div class="sc"><div class="sc-lbl">Presupuesto total</div><div class="sc-n">'+esc(t.csym||"$")+nf(totAmt)+'</div><div class="sc-s">'+esc(t.exBase||"EUR")+' '+nf(totAlt)+'</div></div>';
  h+='<div class="sc"><div class="sc-lbl">Por persona</div><div class="sc-n">'+esc(t.csym||"$")+nf(totAmt/Math.max(1,t.travelers.length))+'</div><div class="sc-s">'+t.travelers.length+' viajero'+(t.travelers.length!==1?"s":"")+'</div></div>';
  h+='<div class="sc"><div class="sc-lbl">Checklist</div><div class="sc-n">'+ckDone+'/'+t.checklist.length+'</div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
  h+='</div>';

  h+='<div class="tabs">';
  [["itinerary","Itinerario"],["budget","Presupuesto"],["checklist","Checklist"]].forEach(function(x){h+='<button class="tab'+(tab===x[0]?" on":"")+'" onclick="setTab(\''+x[0]+'\')">'+x[1]+'</button>';});
  h+='</div>';

  if(tab==="itinerary")h+=rItinerary(dd,devs,t);
  if(tab==="budget")   h+=rBudget(bycat,totAmt,totAlt,t);
  if(tab==="checklist")h+=rChecklist(ckDone,pct,grps,t);
  if(wiz)h+=rWizard();
  if(showSet)h+=rSettings();
  document.getElementById("app").innerHTML=h;
}

// SETTINGS MODAL
function openSet(){
  var t=T();if(!t)return;
  setBuf={name:t.name,destination:t.destination,startDate:t.startDate,endDate:t.endDate,currency:t.currency||"USD",csym:t.csym||"$",exBase:t.exBase||"EUR",exRate:t.exRate||1,travelers:t.travelers.slice()};

}

  var b=setBuf;
  var cOpts="";CURR.forEach(function(c){cOpts+='<option value="'+c.c+'"'+(b.currency===c.c?" selected":"")+'>'+c.c+' ('+c.s+')</option>';});
  var bOpts="";CURR.forEach(function(c){bOpts+='<option value="'+c.c+'"'+(b.exBase===c.c?" selected":"")+'>'+c.c+'</option>';});

  h+='<div><label class="fl">Fecha salida</label><input type="date" value="'+esc(b.startDate)+'" oninput="setBuf.startDate=this.value"></div>';
  h+='<div><label class="fl">Fecha vuelta</label><input type="date" value="'+esc(b.endDate)+'" oninput="setBuf.endDate=this.value"></div>';

  h+='<div><label class="fl">Moneda referencia</label><select onchange="setBuf.exBase=this.value">'+bOpts+'</select></div>';

  h+='</div>';

  return h;
}
function setCS(code){var c=CURR.find(function(x){return x.c===code;});if(c){setBuf.currency=c.c;setBuf.csym=c.s;}render();}
function addSetTv(){setBuf.travelers.push("");render();}
function rmSetTv(i){setBuf.travelers.splice(i,1);render();}
function closeSet(){showSet=false;render();}
function saveSet(){
  var t=T();if(!t)return;
  var tl=setBuf.travelers.map(function(s){return s.trim();}).filter(Boolean);
  if(!tl.length){toast("Añade al menos un viajero");return;}
  Object.assign(t,{name:setBuf.name,destination:setBuf.destination,startDate:setBuf.startDate,endDate:setBuf.endDate,currency:setBuf.currency,csym:setBuf.csym,exBase:setBuf.exBase,exRate:setBuf.exRate,travelers:tl});
  showSet=false;save();render();toast("Viaje actualizado");
}
function delTrip(){
  if(!confirm("¿Eliminar este viaje y todos sus datos?"))return;
  trips=trips.filter(function(t){return t.id!==actId;});
  actId=null;showSet=false;localStorage.setItem("tp6_trips",JSON.stringify(trips));localStorage.removeItem("tp6_id");rHome();toast("Viaje eliminado");
}

  h+='</div>';
  h+='<div class="sech"><div style="font-size:14px;font-weight:500;text-transform:capitalize">'+fmt(selDay,{weekday:"long",day:"numeric",month:"long"})+'</div>';
  h+='<button class="btn sml'+(addEv?" pri":"")+'" onclick="togEv()">'+( addEv?"&#10005; Cancelar":"+ Evento")+'</button></div>';
  if(addEv){h+=evForm(nEv,t,"doAddEv()","togEv()",false);}
  h+='<div class="evlist">';
  if(!devs.length){h+='<div class="empty">Sin eventos este día<br><span style="font-size:12px">Pulsa &ldquo;+ Evento&rdquo;</span></div>';}
  else{devs.forEach(function(ev){
    var cfg=CAT[ev.cat]||CAT.other,isEd=(editEvId===ev.id);
    h+='<div class="ev"><div class="ev-main">';
    h+='<div class="ev-time">'+esc(ev.time)+'</div>';
    h+='<div class="ev-bar" style="background:'+cfg.bg+'"></div>';
    h+='<div class="ev-body"><div class="ev-title">'+esc(ev.title)+'</div>';
    if(ev.location)h+='<div class="ev-loc">&#128205; '+esc(ev.location)+'</div>';
    if(ev.note)h+='<div class="ev-note">'+esc(ev.note)+'</div>';
    if(isUrl(ev.url))h+='<a class="pill" href="'+esc(ev.url)+'" target="_blank">&#128279; '+esc(host(ev.url))+'</a>';
    h+='</div><div class="ev-r"><span class="badge" style="background:'+cfg.bg+';color:'+cfg.color+'">'+cfg.label+'</span>';
    if(+ev.cost>0)h+='<span class="ev-cost">'+esc(t.csym||"$")+nf(+ev.cost)+'</span>';
    h+='<button class="btn edt" onclick="startEEv(\''+ev.id+'\')">&#9998;</button>';
    h+='<button class="btn del" onclick="delEv(\''+ev.id+'\')">&#128465;</button></div></div>';
    if(isEd){h+='<div class="ev-edit">'+evForm(ev,t,"saveEEv('"+ev.id+"')","cancelE()",true)+'</div>';}
    h+='</div>';
  });}
  h+='</div>';
  return h;
}

// BUDGET

  var h='<div class="bsum">';
  Object.keys(BCAT).forEach(function(cat){
    var items=bycat[cat],tot=items.reduce(function(s,b){return s+(+b.amt||0);},0);
    if(!items.length)return;
    h+='<div class="bcat" style="border-left-color:'+BCATC[cat]+'"><div><div class="bcat-n">'+BCAT[cat]+'</div><div class="bcat-c">'+items.length+' partida'+(items.length!==1?"s":"")+'</div></div><div><div class="bcat-u">'+esc(t.csym||"$")+nf(tot)+'</div><div class="bcat-e">'+esc(t.exBase||"EUR")+' '+nf(tot/(t.exRate||1))+'</div></div></div>';
  });
  h+='</div>';
  h+='<div class="sech"><span class="sech-t">Partidas</span><button class="btn sml'+(addBu?" pri":"")+'" onclick="togBu()">'+( addBu?"&#10005; Cancelar":"+ Partida")+'</button></div>';
  if(addBu){h+=buForm(nBu,t,"doAddBu()","togBu()",false);}
  Object.keys(BCAT).forEach(function(cat){
    var items=bycat[cat];if(!items.length)return;
    h+='<div class="bg-t">'+BCAT[cat]+'</div>';
    items.forEach(function(b){
      var isEd=(editBuId===b.id),isH=(b.cat==="hotels");
      var nts=isH&&b.cin&&b.cout?nn(b.cin,b.cout):0;
      h+='<div class="bi" style="border-left-color:'+BCATC[cat]+'"><div class="bi-row">';
      h+='<div style="flex:1;min-width:0"><div class="bi-d">'+esc(b.desc)+'</div>';
      if(isH&&b.cin&&b.cout)h+='<div class="bi-dates">'+fmt(b.cin,{day:"numeric",month:"short"})+'&rarr;'+fmt(b.cout,{day:"numeric",month:"short"})+(nts>0?'&nbsp;&middot;&nbsp;'+nts+' noche'+(nts!==1?"s":""):"")+'</div>';
      if(b.cancel)h+='<div class="bi-cancel">&#9888; Cancelar antes del '+fmt(b.cancel,{day:"numeric",month:"short",year:"numeric"})+'</div>';
      if(isUrl(b.url))h+='<a class="pill" href="'+esc(b.url)+'" target="_blank">&#128279; '+esc(host(b.url))+'</a>';
      h+='</div><div class="bi-a"><div class="bi-u">'+esc(t.csym||"$")+nf(+b.amt,2)+'</div><div class="bi-e">'+esc(t.exBase||"EUR")+' '+nf((+b.amt)/(t.exRate||1))+'</div></div>';
      h+='<button class="btn edt" onclick="startEBu(\''+b.id+'\')">&#9998;</button>';
      h+='<button class="btn del" onclick="delBu(\''+b.id+'\')">&#128465;</button></div>';
      if(isEd){h+='<div class="bi-edit">'+buForm(b,t,"saveEBu('"+b.id+"')","cancelE()",true)+'</div>';}
      h+='</div>';
    });
  });
  h+='<div class="btotal"><div style="font-size:14px;font-weight:500">Total viaje</div><div style="text-align:right"><div style="font-size:24px;font-weight:600;font-family:\'DM Mono\',monospace">'+esc(t.csym||"$")+nf(totAmt,2)+'</div><div style="font-size:13px;color:var(--mu);font-family:\'DM Mono\',monospace">'+esc(t.exBase||"EUR")+' '+nf(totAlt)+'</div></div></div>';
  return h;
}
function buForm(d,t,save,cancel,isEdit){
  var buf=isEdit?"eBuf":"nBu";
  var isCat=d.cat||"flights";
  var isH=(isCat==="hotels");
  var h='<div class="fg">';
  h+='<div class="ff"><label class="fl">Descripción</label><input value="'+esc(d.desc||"")+'" oninput="'+buf+'.desc=this.value" placeholder="Nombre de la partida"></div>';
  h+='<div><label class="fl">Categoría</label><select onchange="'+buf+'.cat=this.value;render()">';
  Object.keys(BCAT).forEach(function(k){h+='<option value="'+k+'"'+(isCat===k?" selected":"")+'>'+BCAT[k]+'</option>';});
  h+='</select></div>';
  h+='<div><label class="fl">Importe ('+esc(t.csym||"$")+')</label><input type="number" value="'+esc(d.amt||"")+'" oninput="'+buf+'.amt=this.value" placeholder="0"></div>';
  if(isH){
    h+='<div><label class="fl">Check-in</label><input type="date" value="'+esc(d.cin||"")+'" oninput="'+buf+'.cin=this.value"></div>';
    h+='<div><label class="fl">Check-out</label><input type="date" value="'+esc(d.cout||"")+'" oninput="'+buf+'.cout=this.value"></div>';
  }
  h+='<div><label class="fl">Cancelación gratuita hasta</label><input type="date" value="'+esc(d.cancel||"")+'" oninput="'+buf+'.cancel=this.value"></div>';
  h+='<div class="ff"><label class="fl">Link (Google Drive, confirmación, voucher...)</label><input type="url" value="'+esc(d.url||"")+'" oninput="'+buf+'.url=this.value" placeholder="https://drive.google.com/..."></div>';
  h+='</div><div class="fa"><button class="btn pri sml" onclick="'+save+'">Guardar</button><button class="btn sml" onclick="'+cancel+'">Cancelar</button></div>';
  return h;
}

// CHECKLIST
function rChecklist(ckDone,pct,grps,t){
  var h='<div style="margin-bottom:1.25rem"><div style="display:flex;justify-content:space-between;font-size:13px;color:var(--mu);margin-bottom:6px"><span>Preparación del viaje</span><span>'+ckDone+'/'+t.checklist.length+' &middot; '+pct+'%</span></div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
  h+='<div class="sech"><span class="sech-t">Lista</span><button class="btn sml'+(addCk?" pri":"")+'" onclick="togCk()">'+( addCk?"&#10005; Cancelar":"+ Añadir")+'</button></div>';
  if(addCk){
    h+='<div class="fbox"><div class="fg">';
    h+='<div class="ff"><label class="fl">Elemento</label><input value="'+esc(nCk.text)+'" oninput="nCk.text=this.value" placeholder="Qué hay que hacer o llevar"></div>';
    h+='<div><label class="fl">Grupo</label><input value="'+esc(nCk.grp)+'" oninput="nCk.grp=this.value" placeholder="Pasaportes, Equipaje..."></div>';
    h+='<div class="ff"><label class="fl">Link (Google Drive, reserva...)</label><input type="url" value="'+esc(nCk.url)+'" oninput="nCk.url=this.value" placeholder="https://drive.google.com/..."></div>';
    h+='</div><div class="fa"><button class="btn pri sml" onclick="doAddCk()">Guardar</button><button class="btn sml" onclick="togCk()">Cancelar</button></div></div>';
  }
  grps.forEach(function(grp){
    var items=t.checklist.filter(function(c){return c.grp===grp;}),gd=items.filter(function(c){return c.done;}).length;
    h+='<div class="ck-g"><div class="ck-gt"><span>'+esc(grp)+'</span><span>'+gd+'/'+items.length+'</span></div>';
    items.forEach(function(item){
      var isEd=(editCkId===item.id);
      h+='<div class="ck-i"><div class="ck-row"><input type="checkbox" '+(item.done?"checked":"")+' onchange="togCkItem(\''+item.id+'\')">';
      h+='<div style="flex:1;min-width:0"><div class="ck-tx'+(item.done?" ck-done":"")+'">'+esc(item.text)+'</div>';
      if(isUrl(item.url))h+='<a class="pill" href="'+esc(item.url)+'" target="_blank">&#128279; '+esc(host(item.url))+'</a>';
      h+='</div><button class="btn edt" onclick="startECk(\''+item.id+'\')">&#9998;</button>';
      h+='<button class="btn del" onclick="delCk(\''+item.id+'\')">&#128465;</button></div>';
      if(isEd){
        h+='<div class="ck-edit"><div class="fg">';
        h+='<div class="ff"><label class="fl">Elemento</label><input value="'+esc(item.text)+'" oninput="eBuf.text=this.value"></div>';
        h+='<div><label class="fl">Grupo</label><input value="'+esc(item.grp)+'" oninput="eBuf.grp=this.value"></div>';
        h+='<div class="ff"><label class="fl">Link (Google Drive, reserva...)</label><input type="url" value="'+esc(item.url||"")+'" oninput="eBuf.url=this.value" placeholder="https://drive.google.com/..."></div>';
        h+='</div><div class="fa"><button class="btn pri sml" onclick="saveECk(\''+item.id+'\')">Guardar</button><button class="btn sml" onclick="cancelE()">Cancelar</button></div></div>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  return h;
}

// WIZARD (4 pasos)
function rWizard(){
  var dots="";for(var i=0;i<4;i++)dots+='<div class="wdot'+(i<wstep?" on":"")+'"></div>';
  var body="",foot="";
  if(wstep===1){
    body='<div class="wlbl">Paso 1 de 4 — Destino</div>';
    body+='<div class="fgf"><label class="fl">Nombre del viaje *</label><input id="wn" value="'+esc(wd.name)+'" oninput="wd.name=this.value" placeholder="Verano · Japón 2026"></div>';
    body+='<div class="fgf"><label class="fl">Destino principal *</label><input id="wdest" value="'+esc(wd.destination)+'" oninput="wd.destination=this.value" placeholder="Tokio, Japón"></div>';
  }else if(wstep===2){
    body='<div class="wlbl">Paso 2 de 4 — Fechas</div>';
    body+='<div class="fg"><div><label class="fl">Fecha salida *</label><input type="date" id="ws" value="'+esc(wd.startDate)+'" oninput="wd.startDate=this.value"></div>';
    body+='<div><label class="fl">Fecha vuelta *</label><input type="date" id="we" value="'+esc(wd.endDate)+'" oninput="wd.endDate=this.value"></div></div>';
  }else if(wstep===3){
    var cO="";CURR.forEach(function(c){cO+='<option value="'+c.c+'"'+(wd.currency===c.c?" selected":"")+'>'+c.c+' ('+c.s+')</option>';});
    var bO="";CURR.forEach(function(c){bO+='<option value="'+c.c+'"'+(wd.exBase===c.c?" selected":"")+'>'+c.c+'</option>';});
    body='<div class="wlbl">Paso 3 de 4 — Moneda</div>';
    body+='<div class="fg"><div class="ff"><label class="fl">Moneda principal del viaje</label><select onchange="wizCS(this.value)">'+cO+'</select></div>';
    body+='<div><label class="fl">Moneda de referencia</label><select onchange="wd.exBase=this.value">'+bO+'</select></div>';
    body+='<div class="ff"><label class="fl">Tipo de cambio (1 '+esc(wd.currency)+' = X '+esc(wd.exBase)+')</label><input type="number" step="0.001" value="'+esc(wd.exRate)+'" oninput="wd.exRate=this.value"></div></div>';
  }else if(wstep===4){
    var tR="";wd.travelers.forEach(function(v,i){tR+='<div class="tv-row"><input value="'+esc(v)+'" oninput="wd.travelers['+i+']=this.value" placeholder="Nombre del viajero"><button class="btn del" onclick="rmWT('+i+')">&#10005;</button></div>';});
    body='<div class="wlbl">Paso 4 de 4 — Viajeros</div>';
    body+='<div class="tv-list">'+tR+'</div>';
    body+='<button class="btn sml" style="margin-top:8px" onclick="addWT()">+ Añadir</button>';
  }else{
    body='<div style="text-align:center;padding:1.5rem 0"><div style="font-size:40px;margin-bottom:.875rem">&#9992;</div><div style="font-size:17px;font-weight:600;margin-bottom:.5rem">¡Viaje creado!</div><div style="font-size:13px;color:var(--mu)">'+esc(wd.name)+' ya aparece en tu lista.</div></div>';
  }
  foot=wstep<5
    ?'<div class="mftr"><button class="btn" onclick="wizBack()">'+(wstep>1?"&#8592; Atrás":"Cancelar")+'</button><button class="btn pri" onclick="wizNext()">'+(wstep===4?"Crear viaje &#10003;":"Siguiente &#8594;")+'</button></div>'
    :'<div class="mftr"><div></div><button class="btn pri" onclick="closeWiz()">Ver el viaje &#8594;</button></div>';
  return '<div class="overlay" onclick="if(event.target===this&&'+wstep+'<5)closeWiz()"><div class="modal"><div class="modal-t">Nuevo viaje</div><div class="modal-s">Configura tu planificador en 4 pasos</div><div class="wdots">'+dots+'</div>'+body+foot+'</div></div>';
}
function wizCS(code){var c=CURR.find(function(x){return x.c===code;});if(c){wd.currency=c.c;wd.csym=c.s;}render();}
function addWT(){wd.travelers.push("");render();}
function rmWT(i){wd.travelers.splice(i,1);render();}

// ACTIONS
function goHome(){actId=null;tab="itinerary";selDay=null;addEv=addBu=addCk=false;editEvId=editBuId=editCkId=null;showSet=false;clearTimeout(syncT);rHome();}
function openTrip(id){actId=id;selDay=null;tab="itinerary";localStorage.setItem("tp6_id",id);render();}
function setTab(v){tab=v;addEv=addBu=addCk=false;editEvId=editBuId=editCkId=null;render();}
function pickDay(d){selDay=d;nEv.day=d;render();}
function togEv(){addEv=!addEv;if(addEv)nEv={day:selDay,time:"09:00",title:"",cat:"activity",location:"",note:"",cost:"",url:""};render();}
function togBu(){addBu=!addBu;if(addBu)nBu={cat:"flights",desc:"",amt:"",cin:"",cout:"",cancel:"",url:""};render();}
function togCk(){addCk=!addCk;if(addCk)nCk={grp:"",text:"",url:""};render();}
function cancelE(){editEvId=null;editBuId=null;editCkId=null;render();}

function doAddEv(){if(!nEv.title){toast("Escribe el título");return;}var t=T();t.events.push({id:uid(),day:nEv.day||selDay,time:nEv.time,title:nEv.title,cat:nEv.cat,location:nEv.location,note:nEv.note,cost:parseFloat(nEv.cost)||0,url:nEv.url});t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);});addEv=false;save();render();toast("Evento añadido");}
function delEv(id){if(confirm("¿Eliminar este evento?")){var t=T();t.events=t.events.filter(function(e){return e.id!==id;});save();render();}}
function startEEv(id){editEvId=id;editBuId=null;editCkId=null;eBuf=Object.assign({},T().events.find(function(e){return e.id===id;}));render();}
function saveEEv(id){var t=T();t.events=t.events.map(function(e){return e.id===id?Object.assign({},e,eBuf,{cost:parseFloat(eBuf.cost)||0}):e;});t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);});editEvId=null;save();render();toast("Guardado");}

function doAddBu(){if(!nBu.desc){toast("Escribe la descripción");return;}T().budget.push({id:uid(),cat:nBu.cat,desc:nBu.desc,amt:parseFloat(nBu.amt)||0,cin:nBu.cin,cout:nBu.cout,cancel:nBu.cancel,url:nBu.url});addBu=false;save();render();toast("Partida añadida");}
function delBu(id){if(confirm("¿Eliminar esta partida?")){var t=T();t.budget=t.budget.filter(function(b){return b.id!==id;});save();render();}}
function startEBu(id){editBuId=id;editEvId=null;editCkId=null;eBuf=Object.assign({},T().budget.find(function(b){return b.id===id;}));render();}
function saveEBu(id){var t=T();t.budget=t.budget.map(function(b){return b.id===id?Object.assign({},b,eBuf,{amt:parseFloat(eBuf.amt)||0}):b;});editBuId=null;save();render();toast("Guardado");}

function togCkItem(id){var t=T();t.checklist=t.checklist.map(function(c){return c.id===id?Object.assign({},c,{done:!c.done}):c;});save();render();}
function delCk(id){if(confirm("¿Eliminar este elemento?")){var t=T();t.checklist=t.checklist.filter(function(c){return c.id!==id;});save();render();}}
function doAddCk(){if(!nCk.text){toast("Escribe el elemento");return;}T().checklist.push({id:uid(),grp:nCk.grp||"General",text:nCk.text,done:false,url:nCk.url});addCk=false;save();render();toast("Añadido");}
function startECk(id){editCkId=id;editEvId=null;editBuId=null;eBuf=Object.assign({},T().checklist.find(function(c){return c.id===id;}));render();}
function saveECk(id){var t=T();t.checklist=t.checklist.map(function(c){return c.id===id?Object.assign({},c,eBuf):c;});editCkId=null;save();render();toast("Guardado");}

function openWiz(){wiz=true;wstep=1;wd={name:"",destination:"",startDate:"",endDate:"",currency:"USD",csym:"$",exBase:"EUR",exRate:"1.08",travelers:[""]};render();}
function closeWiz(){wiz=false;if(actId)render();else rHome();}
function wizNext(){
  if(wstep===1){var n=document.getElementById("wn"),d=document.getElementById("wdest");if(n)wd.name=n.value;if(d)wd.destination=d.value;if(!wd.name||!wd.destination){toast("Rellena nombre y destino");return;}}
  if(wstep===2){var s=document.getElementById("ws"),e=document.getElementById("we");if(s)wd.startDate=s.value;if(e)wd.endDate=e.value;if(!wd.startDate||!wd.endDate){toast("Elige las fechas");return;}if(wd.startDate>wd.endDate){toast("La salida debe ser antes que la vuelta");return;}}
  if(wstep===4){var tl=wd.travelers.map(function(s){return s.trim();}).filter(Boolean);if(!tl.length){toast("Añade al menos un viajero");return;}var nt={id:uid(),name:wd.name,destination:wd.destination,startDate:wd.startDate,endDate:wd.endDate,currency:wd.currency,csym:wd.csym,exBase:wd.exBase,exRate:parseFloat(wd.exRate)||1,travelers:tl,events:[],budget:[],checklist:[]};trips.push(nt);actId=nt.id;selDay=nt.startDate;tab="itinerary";localStorage.setItem("tp6_trips",JSON.stringify(trips));localStorage.setItem("tp6_id",actId);}
  wstep++;render();
}
function wizBack(){wstep>1?wstep--:closeWiz();render();}

// expose globals
var _g=[goHome,openTrip,setTab,pickDay,togEv,togBu,togCk,cancelE,
  doAddEv,delEv,startEEv,saveEEv,doAddBu,delBu,startEBu,saveEBu,
  togCkItem,delCk,doAddCk,startECk,saveECk,
  openSet,closeSet,saveSet,delTrip,setCS,addSetTv,rmSetTv,
  openWiz,closeWiz,wizNext,wizBack,wizCS,addWT,rmWT];
_g.forEach(function(f){window[f.name]=f;});
window.nEv=nEv;window.nBu=nBu;window.nCk=nCk;window.eBuf=eBuf;window.wd=wd;window.setBuf=setBuf;

if(actId&&!trips.find(function(t){return t.id===actId;}))actId=null;
if(actId)render();else rHome();
</script>

<!-- PASSWORD -->
<div id="pw-overlay" style="position:fixed;inset:0;background:#F6F4EF;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1.5rem;font-family:'DM Sans',sans-serif">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:.5rem">&#9992;</div>
    <div style="font-size:18px;font-weight:600;color:#1A1816;margin-bottom:.25rem">Travel Planner</div>
    <div style="font-size:13px;color:#6E6860">Introduce la contraseña para continuar</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input id="pw-input" type="password" placeholder="Contraseña" maxlength="20" style="font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 16px;border:1px solid #DDD9D0;border-radius:8px;outline:none;width:200px;text-align:center;background:#fff;color:#1A1816" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;background:#1A1816;color:#fff;border:none;border-radius:8px;cursor:pointer">Entrar</button>
  </div>
  <div id="pw-err" style="font-size:12px;color:#B33030;display:none">Contraseña incorrecta</div>
</div>
<script>
(function(){if(sessionStorage.getItem("tp6_auth")==="1")document.getElementById("pw-overlay").style.display="none";})();
function checkPw(){var v=document.getElementById("pw-input").value;if(v==="0000"){sessionStorage.setItem("tp6_auth","1");document.getElementById("pw-overlay").style.display="none";}else{document.getElementById("pw-err").style.display="block";document.getElementById("pw-input").value="";document.getElementById("pw-input").focus();}}
</script>
</body>
