<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F4EF;--surf:#fff;--surf2:#EFECE6;
  --brd:#DDD9D0;--brd2:#C4BEB5;
  --tx:#1A1816;--mu:#6E6860;--fa:#B0A89E;
  --blue:#1A5CA8;--bluebg:#E8F0FB;
  --green:#0D6B4A;--greenbg:#DDF3EA;
  --purple:#4F35B3;--purplebg:#ECEAFC;
  --amber:#9E600A;--amberbg:#FDF2DC;
  --red:#B33030;--redbg:#FAE8E8;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --shm:0 4px 20px rgba(0,0,0,0.13);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;min-height:100vh}
.wrap{max-width:940px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;gap:.75rem;flex-wrap:wrap}
.nav-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);letter-spacing:.1em}
.proj-sel{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--surf);color:var(--tx);outline:none;max-width:240px}
.nav-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--surf);color:var(--tx);transition:border-color .15s;white-space:nowrap}
.btn:hover{border-color:var(--brd2)}
.btn.pri{background:var(--tx);color:#fff;border-color:var(--tx)}
.btn.pri:hover{opacity:.87}
.btn.sml{padding:4px 10px;font-size:12px}
.btn.del{background:none;border:none;color:var(--fa);padding:2px 6px;font-size:12px}
.btn.del:hover{color:var(--red)}
.btn.edit{background:none;border:none;color:var(--mu);padding:2px 6px;font-size:12px}
.btn.edit:hover{color:var(--tx)}
.btn:disabled{opacity:.4;cursor:default}
.hdr{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1.5rem 1.75rem;margin-bottom:1rem;box-shadow:var(--sh)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.dest-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-family:'DM Mono',monospace}
.trip-name{font-size:22px;font-weight:600;line-height:1.2}
.trip-meta{font-size:12px;color:var(--mu);margin-top:4px}
.cdown{text-align:right;flex-shrink:0}
.cdown-n{font-size:40px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.cdown-l{font-size:10px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.travelers{display:flex;gap:5px;margin-top:.875rem;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 11px;background:var(--surf2);border:1px solid var(--brd);border-radius:100px;color:var(--mu)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.875rem 1.125rem;box-shadow:var(--sh)}
.sc-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'DM Mono',monospace}
.sc-n{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.sc-s{font-size:11px;color:var(--mu);margin-top:1px}
.pbar{height:4px;background:var(--surf2);border-radius:100px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:var(--tx);border-radius:100px;transition:width .4s}
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:1.25rem}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:.625rem 1.25rem;font-size:13px;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:-1px;transition:all .15s}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:500}
.tab:hover:not(.on){color:var(--tx)}
.dpick{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:1rem;scrollbar-width:none}
.dpick::-webkit-scrollbar{display:none}
.dbt{flex-shrink:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:9px 13px;cursor:pointer;text-align:center;min-width:62px;transition:all .15s}
.dbt:hover{border-color:var(--brd2)}
.dbt.on{background:var(--tx);border-color:var(--tx)}
.dbt .wd{font-size:10px;text-transform:uppercase;color:var(--mu);margin-bottom:2px;font-family:'DM Mono',monospace}
.dbt .dd{font-size:19px;font-weight:600;line-height:1;color:var(--tx)}
.dbt .mo{font-size:10px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.dbt.on .wd,.dbt.on .dd,.dbt.on .mo{color:#fff}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--brd);margin:4px auto 0}
.dbt.on .ddot{background:rgba(255,255,255,.45)}
.sech{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.sech-t{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.fbox{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:1rem 1.125rem;margin-bottom:1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ff{grid-column:1/-1}
.fl{font-size:10px;color:var(--mu);display:block;margin-bottom:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--surf);color:var(--tx);width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--tx)}
textarea{resize:vertical}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--tx);flex-shrink:0}
.fa{display:flex;gap:8px;align-items:center;margin-top:6px}
/* EVENTS */
.evlist{display:flex;flex-direction:column;gap:7px}
.ev{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh)}
.ev-main{display:flex;gap:12px;padding:.875rem 1.125rem}
.ev-edit{padding:.875rem 1.125rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--r) var(--r)}
.ev-time{font-size:12px;font-weight:500;min-width:40px;text-align:right;font-family:'DM Mono',monospace;padding-top:2px;color:var(--mu)}
.ev-bar{width:3px;border-radius:4px;flex-shrink:0;align-self:stretch;min-height:20px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500;margin-bottom:2px}
.ev-loc{font-size:12px;color:var(--mu)}
.ev-note{font-size:12px;color:var(--mu);margin-top:4px;line-height:1.5;font-style:italic}
.ev-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap}
.ev-cost{font-size:12px;color:var(--mu);font-family:'DM Mono',monospace}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;margin-top:4px;background:var(--bluebg);padding:2px 9px;border-radius:100px;border:1px solid #C5D9F2}
.pill:hover{opacity:.8}
.empty{text-align:center;padding:3rem 1rem;color:var(--fa);font-size:13px;line-height:2.2}
/* BUDGET */
.bsum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.bcat{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.75rem 1rem;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
.bcat-n{font-size:11px;color:var(--mu);margin-bottom:1px;font-family:'DM Mono',monospace}
.bcat-c{font-size:10px;color:var(--fa)}
.bcat-u{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.bcat-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.bg-t{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .4rem;font-family:'DM Mono',monospace}
.bi{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:4px;border-left:3px solid transparent}
.bi-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.bi-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.bi-d{font-size:13px}
.bi-c{font-size:11px;color:var(--fa);margin-top:1px;font-family:'DM Mono',monospace}
.bi-a{text-align:right;flex-shrink:0}
.bi-u{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.bi-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.btotal{border-top:1px solid var(--brd);padding-top:1rem;margin-top:1rem;display:flex;justify-content:space-between;align-items:center}
/* CHECKLIST */
.ck-g{margin-bottom:1.25rem}
.ck-gt{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;display:flex;justify-content:space-between;font-family:'DM Mono',monospace}
.ck-i{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:3px}
.ck-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.ck-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.ck-tx{flex:1;font-size:13px}
.ck-done{color:var(--fa);text-decoration:line-through}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,18,16,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:var(--surf);border-radius:14px;padding:2rem 2.25rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shm)}
.modal-t{font-size:18px;font-weight:600;margin-bottom:.25rem}
.modal-s{font-size:13px;color:var(--mu);margin-bottom:1.5rem;line-height:1.5}
.wdots{display:flex;gap:5px;margin-bottom:1.5rem}
.wdot{height:4px;flex:1;border-radius:100px;background:var(--surf2)}
.wdot.on{background:var(--tx)}
.wlbl{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.mftr{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--brd)}
.fgf{margin-bottom:.875rem}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;font-size:12px;padding:8px 20px;border-radius:100px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;font-family:'DM Mono',monospace;white-space:nowrap;box-shadow:var(--shm)}
.toast.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #ccc;border-top-color:#333;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@media(max-width:620px){
  .sgrid,.bsum{grid-template-columns:1fr 1fr}
  .fg{grid-template-columns:1fr}
  .hdr-top{flex-direction:column}
  .cdown{text-align:left}
}
</style>
</head>

function host(s) { try{return new URL(s).hostname.replace(/^www\./,"");}catch(e){return"Enlace";} }
function fmt(d,o){ try{return new Date(d+"T00:00:00").toLocaleDateString("es-ES",o);}catch(e){return d||"";} }
function daysArr(s,e){ var a=[],c=new Date(s+"T00:00:00"),en=new Date(e+"T00:00:00"); while(c<=en){a.push(c.toISOString().split("T")[0]);c.setDate(c.getDate()+1);} return a; }
function fday(d) { var dt=new Date(d+"T00:00:00"); return {d:dt.getDate(),wd:dt.toLocaleDateString("es-ES",{weekday:"short"}),mo:dt.toLocaleDateString("es-ES",{month:"short"})}; }
function toast(msg,dur){ var el=document.getElementById("toast"); el.textContent=msg; el.className="toast show"; setTimeout(function(){el.className="toast";},dur||2800); }

// ── SYNC (text/plain avoids CORS preflight on Apps Script) ────────────────────
function syncToSheets() {
  if (syncing) return;
  syncing=true; syncOk=false; syncErr=false; render();
  var t = trip();
  var records = [];
  t.events.forEach(function(e){ records.push({id:e.id,type:"event",day:e.day,time:e.time,title:e.title,cat:e.cat,location:e.location||"",note:e.note||"",cost:e.cost||0,url:e.url||""}); });
  t.budget.forEach(function(b){ records.push({id:b.id,type:"budget",cat:b.cat,desc:b.desc,usd:b.usd||0,cancel:b.cancel||"",url:b.url||""}); });
  t.checklist.forEach(function(c){ records.push({id:c.id,type:"checklist",group:c.group,title:c.text,done:c.done||false,url:c.url||""}); });
  var payload = JSON.stringify({action:"sync_all",records:records});
  // Use text/plain to avoid CORS preflight OPTIONS request on Apps Script
  fetch(SCRIPT_URL, {method:"POST", headers:{"Content-Type":"text/plain"}, body:payload})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.ok) throw new Error(data.error||"Error desconocido");
      lastSync = new Date().toLocaleTimeString("es-ES");
      localStorage.setItem("tp5_ls",lastSync);
      syncing=false; syncOk=true;
      toast("Sincronizado con Google Sheets ("+records.length+" filas)");
      render();
    })
    .catch(function(err){
      syncing=false; syncErr=true;
      toast("Error: "+err.message, 4000);
      render();
    });
}

// ── EDIT HELPERS ──────────────────────────────────────────────────────────────
function editForm(fields, saveCall, cancelCall) {
  var h = '<div class="fg">';
  fields.forEach(function(f){
    var cls = f.full ? ' class="ff"' : '';
    h += '<div'+cls+'>';
    h += '<label class="fl">'+f.label+'</label>';
    if (f.type==="select") {
      h += '<select onchange="'+f.onchange+'">';
      f.options.forEach(function(o){ h += '<option value="'+esc(o.v)+'"'+(o.v===f.val?' selected':'')+'>'+esc(o.l)+'</option>'; });
      h += '</select>';
    } else if (f.type==="textarea") {
      h += '<textarea rows="2" oninput="'+f.oninput+'">'+esc(f.val||"")+'</textarea>';
    } else {
      h += '<input type="'+(f.type||"text")+'" value="'+esc(f.val||"")+'" placeholder="'+(f.ph||"")+'" oninput="'+f.oninput+'">';
    }
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="fa"><button class="btn pri sml" onclick="'+saveCall+'">Guardar</button><button class="btn sml" onclick="'+cancelCall+'">Cancelar</button></div>';
  return h;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var t = trip();
  var dd = daysArr(t.startDate, t.endDate);
  if (!selDay || dd.indexOf(selDay)<0) selDay = t.startDate;
  var devs = t.events.filter(function(e){return e.day===selDay;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var totUSD = t.budget.reduce(function(s,b){return s+(+b.usd||0);},0);
  var totEUR = totUSD/t.exchangeRate;
  var bycat = {}; Object.keys(BCAT).forEach(function(k){bycat[k]=t.budget.filter(function(b){return b.cat===k;});});
  var ckDone = t.checklist.filter(function(c){return c.done;}).length;
  var pct = t.checklist.length ? Math.round(ckDone/t.checklist.length*100) : 0;
  var ckGroups = []; t.checklist.forEach(function(c){if(ckGroups.indexOf(c.group)<0)ckGroups.push(c.group);});
  var today = new Date(); today.setHours(0,0,0,0);
  var dLeft = Math.ceil((new Date(t.startDate+"T00:00:00")-today)/86400000);

  var syncBtn = syncing
    ? '<button class="btn" disabled><span class="spin"></span>Sincronizando...</button>'
    : (syncOk
        ? '<span style="font-size:11px;color:var(--green);font-family:\'DM Mono\',monospace;margin-right:4px">&#10003; '+esc(lastSync)+'</span><button class="btn sml" onclick="syncToSheets()">&#9729; Sync</button>'
        : (syncErr
            ? '<span style="font-size:11px;color:var(--red);font-family:\'DM Mono\',monospace;margin-right:4px">&#10007; Error</span><button class="btn sml" onclick="syncToSheets()">Reintentar</button>'
            : '<button class="btn" onclick="syncToSheets()">&#9729; Sincronizar con Sheets</button>'));

  var h = "";

  // NAV
  h += '<div class="nav"><div class="nav-l"><span class="logo">&#9992; TRAVEL PLANNER</span>';
  h += '<select class="proj-sel" onchange="switchTrip(this.value)">';
  trips.forEach(function(tp){ h += '<option value="'+esc(tp.id)+'"'+(tp.id===actId?' selected':'')+'>'+esc(tp.name)+'</option>'; });
  h += '</select></div><div class="nav-r">'+syncBtn+'<button class="btn pri" onclick="openWiz()">+ Nuevo viaje</button></div></div>';

  // HEADER
  h += '<div class="hdr"><div class="hdr-top"><div>';
  h += '<div class="dest-lbl">'+esc(t.destination)+'</div>';
  h += '<div class="trip-name">'+esc(t.name)+'</div>';
  h += '<div class="trip-meta">'+fmt(t.startDate,{day:"numeric",month:"long"})+' &mdash; '+fmt(t.endDate,{day:"numeric",month:"long",year:"numeric"})+'&nbsp;&middot;&nbsp;'+dd.length+' d&iacute;as&nbsp;&middot;&nbsp;'+t.travelers.length+' viajero'+(t.travelers.length!==1?"s":"")+'</div>';
  h += '</div><div class="cdown"><div class="cdown-n">'+(dLeft>0?dLeft:dLeft===0?"HOY":"&#9992;")+'</div>';
  h += '<div class="cdown-l">'+(dLeft>0?"d&iacute;as":"el viaje es hoy")+'</div></div></div>';
  h += '<div class="travelers">'; t.travelers.forEach(function(tv){h+='<span class="chip">'+esc(tv)+'</span>';}); h += '</div></div>';

  // SUMMARY
  h += '<div class="sgrid">';
  h += '<div class="sc"><div class="sc-lbl">Total presupuesto</div><div class="sc-n">$'+nf(totUSD)+'</div><div class="sc-s">&euro;'+nf(totEUR)+'</div></div>';
  h += '<div class="sc"><div class="sc-lbl">Por persona</div><div class="sc-n">$'+nf(totUSD/Math.max(1,t.travelers.length))+'</div><div class="sc-s">'+t.travelers.length+' viajero'+(t.travelers.length!==1?"s":"")+'</div></div>';
  h += '<div class="sc"><div class="sc-lbl">Checklist</div><div class="sc-n">'+ckDone+'/'+t.checklist.length+'</div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
  h += '</div>';

  // TABS
  h += '<div class="tabs">';
  h += '<button class="tab'+(tab==="itinerary"?" on":"")+'" onclick="setTab(\'itinerary\')">Itinerario</button>';
  h += '<button class="tab'+(tab==="budget"?" on":"")+'" onclick="setTab(\'budget\')">Presupuesto</button>';
  h += '<button class="tab'+(tab==="checklist"?" on":"")+'" onclick="setTab(\'checklist\')">Checklist</button>';
  h += '</div>';

  if (tab==="itinerary") h += rItinerary(dd,devs,t);
  if (tab==="budget")    h += rBudget(bycat,totUSD,totEUR,t);
  if (tab==="checklist") h += rChecklist(ckDone,pct,ckGroups,t);
  if (wiz)               h += rWizard();

  document.getElementById("app").innerHTML = h;
}

    ],"doAddEv()","togAddEv()");

      h += '</div>';
      h += '<div class="ev-r"><span class="badge" style="background:'+cfg.bg+';color:'+cfg.color+'">'+cfg.label+'</span>';

// ── BUDGET ────────────────────────────────────────────────────────────────────
function rBudget(bycat,totUSD,totEUR,t) {
  var h = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap">';
  h += '<label style="font-size:12px;color:var(--mu)">Cambio USD &rarr; EUR:</label>';
  h += '<input type="number" step="0.01" value="'+t.exchangeRate+'" style="width:80px" oninput="updRate(this.value)">';
  h += '<span style="font-size:11px;color:var(--mu);font-family:\'DM Mono\',monospace">&euro;1 = $'+(+t.exchangeRate).toFixed(3)+'</span></div>';

  h += '<div class="bsum">';
  Object.keys(BCAT).forEach(function(cat){
    var items=bycat[cat], tot=items.reduce(function(s,b){return s+(+b.usd||0);},0);
    if (!items.length) return;
    h += '<div class="bcat" style="border-left-color:'+BCATC[cat]+'"><div><div class="bcat-n">'+BCAT[cat]+'</div><div class="bcat-c">'+items.length+' partida'+(items.length!==1?"s":"")+'</div></div>';
    h += '<div><div class="bcat-u">$'+nf(tot)+'</div><div class="bcat-e">&euro;'+nf(tot/t.exchangeRate)+'</div></div></div>';
  });
  h += '</div>';

  h += '<div class="sech"><span class="sech-t">Partidas de gasto</span><button class="btn sml'+(addBu?" pri":"")+'" onclick="togAddBu()">'+( addBu?"&#10005; Cancelar":"+ Partida")+'</button></div>';

  if (addBu) {
    h += '<div class="fbox">';
    h += editForm([
      {label:"Descripci&oacute;n *",full:true,oninput:"nBu.desc=this.value",val:nBu.desc,ph:"Nombre de la partida"},
      {label:"Categor&iacute;a",type:"select",onchange:"nBu.cat=this.value",val:nBu.cat,options:Object.keys(BCAT).map(function(k){return{v:k,l:BCAT[k]};})},
      {label:"Importe USD",type:"number",oninput:"nBu.usd=this.value",val:nBu.usd,ph:"0"},
      {label:"Cancelaci&oacute;n gratuita hasta",type:"date",oninput:"nBu.cancel=this.value",val:nBu.cancel},
      {label:"URL documento (confirmaci&oacute;n, voucher...)",full:true,type:"url",oninput:"nBu.url=this.value",val:nBu.url,ph:"https://"}
    ],"doAddBu()","togAddBu()");
    h += '</div>';
  }

  Object.keys(BCAT).forEach(function(cat){
    var items=bycat[cat]; if (!items.length) return;
    h += '<div class="bg-t">'+BCAT[cat]+'</div>';
    items.forEach(function(b){
      var isEditing=(editBuId===b.id);
      h += '<div class="bi" style="border-left-color:'+BCATC[cat]+'"><div class="bi-row">';
      h += '<div style="flex:1;min-width:0"><div class="bi-d">'+esc(b.desc)+'</div>';
      if (b.cancel) h += '<div class="bi-c">Cancel. hasta '+fmt(b.cancel,{day:"numeric",month:"short",year:"numeric"})+'</div>';
      if (isUrl(b.url)) h += '<a class="pill" href="'+esc(b.url)+'" target="_blank">&#128279; '+esc(host(b.url))+'</a>';
      h += '</div>';
      h += '<div class="bi-a"><div class="bi-u">$'+nf(+b.usd,2)+'</div><div class="bi-e">&euro;'+nf((+b.usd)/t.exchangeRate)+'</div></div>';
      h += '<button class="btn edit" onclick="startEditBu(\''+b.id+'\')">&#9998;</button>';
      h += '<button class="btn del" onclick="delBu(\''+b.id+'\')">&#10005;</button></div>';
      if (isEditing) {
        h += '<div class="bi-edit">';
        h += editForm([
          {label:"Descripci&oacute;n",full:true,oninput:"editBuBuf.desc=this.value",val:b.desc},
          {label:"Categor&iacute;a",type:"select",onchange:"editBuBuf.cat=this.value",val:b.cat,options:Object.keys(BCAT).map(function(k){return{v:k,l:BCAT[k]};})},
          {label:"Importe USD",type:"number",oninput:"editBuBuf.usd=this.value",val:b.usd},
          {label:"Cancelaci&oacute;n hasta",type:"date",oninput:"editBuBuf.cancel=this.value",val:b.cancel||""},
          {label:"URL documento (confirmaci&oacute;n, voucher, reserva...)",full:true,type:"url",oninput:"editBuBuf.url=this.value",val:b.url||"",ph:"https://"}
        ],"saveEditBu('"+b.id+"')","cancelEdit()");
        h += '</div>';
      }
      h += '</div>';
    });
  });

  h += '<div class="btotal"><div style="font-size:14px;font-weight:500">Total viaje</div>';
  h += '<div style="text-align:right"><div style="font-size:24px;font-weight:600;font-family:\'DM Mono\',monospace">$'+nf(totUSD,2)+'</div>';
  h += '<div style="font-size:13px;color:var(--mu);font-family:\'DM Mono\',monospace">&euro;'+nf(totEUR)+'</div></div></div>';
  return h;
}

// ── WIZARD ────────────────────────────────────────────────────────────────────
function rWizard() {
  var dots=""; for(var i=0;i<3;i++) dots+='<div class="wdot'+(i<wstep?" on":"")+'"></div>';
  var body="";
  if (wstep===1) { body='<div class="wlbl">Paso 1 de 3 &mdash; Destino</div><div class="fgf"><label class="fl">Nombre del viaje *</label><input id="wn" value="'+esc(wdata.name)+'" oninput="wdata.name=this.value" placeholder="Verano &middot; Jap&oacute;n 2026"></div><div class="fgf"><label class="fl">Destino principal *</label><input id="wd" value="'+esc(wdata.destination)+'" oninput="wdata.destination=this.value" placeholder="Tokio, Jap&oacute;n"></div>'; }
  else if (wstep===2) { body='<div class="wlbl">Paso 2 de 3 &mdash; Fechas</div><div class="fg"><div><label class="fl">Fecha de salida *</label><input type="date" id="ws" value="'+esc(wdata.startDate)+'" oninput="wdata.startDate=this.value"></div><div><label class="fl">Fecha de vuelta *</label><input type="date" id="we" value="'+esc(wdata.endDate)+'" oninput="wdata.endDate=this.value"></div><div><label class="fl">Cambio USD/EUR</label><input type="number" step="0.01" value="'+esc(wdata.exchangeRate)+'" oninput="wdata.exchangeRate=this.value"></div></div>'; }
  else if (wstep===3) { body='<div class="wlbl">Paso 3 de 3 &mdash; Viajeros</div><div class="fgf"><label class="fl">Un nombre por l&iacute;nea</label><textarea id="wt" oninput="wdata.travelers=this.value" rows="4" placeholder="Ana Garc&iacute;a\nPedro Garc&iacute;a">'+esc(wdata.travelers)+'</textarea></div><div style="font-size:12px;color:var(--mu);background:var(--surf2);padding:.75rem 1rem;border-radius:var(--rs)">El planificador se crear&aacute; vac&iacute;o, listo para rellenar.</div>'; }
  else { body='<div style="text-align:center;padding:1.5rem 0"><div style="font-size:40px;margin-bottom:.875rem">&#9992;</div><div style="font-size:17px;font-weight:600;margin-bottom:.5rem">&#161;Proyecto creado!</div><div style="font-size:13px;color:var(--mu)">'+esc(wdata.name)+' ya aparece en el selector.</div></div>'; }
  var footer = wstep<4
    ? '<div class="mftr"><button class="btn" onclick="wizBack()">'+(wstep>1?"&#8592; Atr&aacute;s":"Cancelar")+'</button><button class="btn pri" onclick="wizNext()">'+(wstep===3?"Crear &#10003;":"Siguiente &rarr;")+'</button></div>'
    : '<div class="mftr"><div></div><button class="btn pri" onclick="closeWiz()">Ir al proyecto &rarr;</button></div>';
  return '<div class="overlay" onclick="if(event.target===this&&'+wstep+'<4)closeWiz()"><div class="modal"><div class="modal-t">Nuevo proyecto de viaje</div><div class="modal-s">Crea tu planificador en 3 pasos</div><div class="wdots">'+dots+'</div>'+body+footer+'</div></div>';
}

// ── BUFFERS FOR INLINE EDIT ───────────────────────────────────────────────────
var editEvBuf = {}, editBuBuf = {}, editCkBuf = {};

function startEditEv(id){ editEvId=id; editBuId=null; editCkId=null; var ev=trip().events.find(function(e){return e.id===id;}); editEvBuf=Object.assign({},ev); render(); }
function startEditBu(id){ editBuId=id; editEvId=null; editCkId=null; var b=trip().budget.find(function(b){return b.id===id;}); editBuBuf=Object.assign({},b); render(); }
function startEditCk(id){ editCkId=id; editEvId=null; editBuId=null; var c=trip().checklist.find(function(c){return c.id===id;}); editCkBuf=Object.assign({},c); render(); }
function cancelEdit(){ editEvId=null; editBuId=null; editCkId=null; render(); }

function saveEditEv(id){
  var t=trip(); t.events=t.events.map(function(e){ return e.id===id?Object.assign({},e,editEvBuf,{cost:parseFloat(editEvBuf.cost)||0}):e; });
  t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);});
  editEvId=null; save(); render(); toast("Evento guardado");
}
function saveEditBu(id){
  var t=trip(); t.budget=t.budget.map(function(b){ return b.id===id?Object.assign({},b,editBuBuf,{usd:parseFloat(editBuBuf.usd)||0}):b; });
  editBuId=null; save(); render(); toast("Partida guardada");
}
function saveEditCk(id){
  var t=trip(); t.checklist=t.checklist.map(function(c){ return c.id===id?Object.assign({},c,editCkBuf):c; });
  editCkId=null; save(); render(); toast("Elemento guardado");
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(t)   { tab=t; addEv=addBu=addCk=false; editEvId=editBuId=editCkId=null; render(); }
function pickDay(d)  { selDay=d; nEv.day=d; render(); }
function switchTrip(id){ actId=id; selDay=null; tab="itinerary"; save(); render(); }
function togAddEv()  { addEv=!addEv; if(addEv){nEv={day:selDay,time:"09:00",title:"",cat:"activity",location:"",note:"",cost:"",url:""};} render(); }
function togAddBu()  { addBu=!addBu; if(addBu){nBu={cat:"flights",desc:"",usd:"",cancel:"",url:""};} render(); }
function togAddCk()  { addCk=!addCk; if(addCk){nCk={group:"",text:"",url:""};} render(); }
function updRate(v)  { trip().exchangeRate=parseFloat(v)||1.08; save(); render(); }

function doAddEv(){
  if (!nEv.title){ toast("Escribe el t\u00edtulo"); return; }
  var t=trip(); t.events.push({id:uid(),day:nEv.day||selDay,time:nEv.time,title:nEv.title,cat:nEv.cat,location:nEv.location,note:nEv.note,cost:parseFloat(nEv.cost)||0,url:nEv.url});
  t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);}); addEv=false; save(); render(); toast("Evento a\u00f1adido");
}
function delEv(id){ if(confirm("\u00bfEliminar este evento?")){ var t=trip(); t.events=t.events.filter(function(e){return e.id!==id;}); save(); render(); } }

function doAddBu(){
  if (!nBu.desc){ toast("Escribe la descripci\u00f3n"); return; }
  trip().budget.push({id:uid(),cat:nBu.cat,desc:nBu.desc,usd:parseFloat(nBu.usd)||0,cancel:nBu.cancel,url:nBu.url});
  addBu=false; save(); render(); toast("Partida a\u00f1adida");
}
function delBu(id){ if(confirm("\u00bfEliminar esta partida?")){ var t=trip(); t.budget=t.budget.filter(function(b){return b.id!==id;}); save(); render(); } }

function togCk(id){ var t=trip(); t.checklist=t.checklist.map(function(c){return c.id===id?Object.assign({},c,{done:!c.done}):c;}); save(); render(); }
function delCk(id){ if(confirm("\u00bfEliminar este elemento?")){ var t=trip(); t.checklist=t.checklist.filter(function(c){return c.id!==id;}); save(); render(); } }
function doAddCk(){
  if (!nCk.text){ toast("Escribe el elemento"); return; }
  trip().checklist.push({id:uid(),group:nCk.group||"General",text:nCk.text,done:false,url:nCk.url});
  addCk=false; save(); render(); toast("Elemento a\u00f1adido");
}

function openWiz(){ wiz=true; wstep=1; wdata={name:"",destination:"",startDate:"",endDate:"",travelers:"",exchangeRate:"1.08"}; render(); }
function closeWiz(){ wiz=false; render(); }
function wizNext(){
  if(wstep===1){ var n=document.getElementById("wn"),d=document.getElementById("wd"); if(n)wdata.name=n.value; if(d)wdata.destination=d.value; if(!wdata.name||!wdata.destination){toast("Rellena el nombre y el destino");return;} }
  if(wstep===2){ var s=document.getElementById("ws"),e=document.getElementById("we"); if(s)wdata.startDate=s.value; if(e)wdata.endDate=e.value; if(!wdata.startDate||!wdata.endDate){toast("Elige las fechas");return;} if(wdata.startDate>wdata.endDate){toast("La salida debe ser antes que la vuelta");return;} }
  if(wstep===3){ var tv=document.getElementById("wt"); if(tv)wdata.travelers=tv.value; var tl=(wdata.travelers||"").split("\n").map(function(s){return s.trim();}).filter(Boolean); trips.push({id:uid(),name:wdata.name,destination:wdata.destination,startDate:wdata.startDate,endDate:wdata.endDate,exchangeRate:parseFloat(wdata.exchangeRate)||1.08,travelers:tl.length?tl:["Viajero"],events:[],budget:[],checklist:[]}); actId=trips[trips.length-1].id; selDay=trips[trips.length-1].startDate; tab="itinerary"; save(); }
  wstep++; render();
}
function wizBack(){ wstep>1?wstep--:closeWiz(); render(); }

// expose
window.setTab=setTab; window.pickDay=pickDay; window.switchTrip=switchTrip;
window.togAddEv=togAddEv; window.togAddBu=togAddBu; window.togAddCk=togAddCk;
window.doAddEv=doAddEv; window.delEv=delEv; window.doAddBu=doAddBu; window.delBu=delBu;
window.togCk=togCk; window.delCk=delCk; window.doAddCk=doAddCk; window.updRate=updRate;
window.syncToSheets=syncToSheets;
window.startEditEv=startEditEv; window.startEditBu=startEditBu; window.startEditCk=startEditCk;
window.cancelEdit=cancelEdit; window.saveEditEv=saveEditEv; window.saveEditBu=saveEditBu; window.saveEditCk=saveEditCk;
window.openWiz=openWiz; window.closeWiz=closeWiz; window.wizNext=wizNext; window.wizBack=wizBack;
window.editEvBuf=editEvBuf; window.editBuBuf=editBuBuf; window.editCkBuf=editCkBuf;
window.nEv=nEv; window.nBu=nBu; window.nCk=nCk; window.wdata=wdata;

render();
</script>

<!-- PASSWORD -->
<div id="pw-overlay" style="position:fixed;inset:0;background:#F6F4EF;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1.5rem;font-family:'DM Sans',sans-serif">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:.5rem">&#9992;</div>
    <div style="font-size:18px;font-weight:600;color:#1A1816;margin-bottom:.25rem">Travel Planner</div>
    <div style="font-size:13px;color:#6E6860">Introduce la contrase&ntilde;a para continuar</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input id="pw-input" type="password" placeholder="Contrase&ntilde;a" maxlength="20" style="font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 16px;border:1px solid #DDD9D0;border-radius:8px;outline:none;width:200px;text-align:center;background:#fff;color:#1A1816" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;background:#1A1816;color:#fff;border:none;border-radius:8px;cursor:pointer">Entrar</button>
  </div>
  <div id="pw-err" style="font-size:12px;color:#B33030;display:none">Contrase&ntilde;a incorrecta</div>
</div>
<script>
(function(){if(sessionStorage.getItem("tp5_auth")==="1")document.getElementById("pw-overlay").style.display="none";})();
function checkPw(){
  var v=document.getElementById("pw-input").value;
  if(v==="0000"){sessionStorage.setItem("tp5_auth","1");document.getElementById("pw-overlay").style.display="none";}
  else{document.getElementById("pw-err").style.display="block";document.getElementById("pw-input").value="";document.getElementById("pw-input").focus();}
}
</script>
