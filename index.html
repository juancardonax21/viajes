<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F4EF;--surf:#fff;--surf2:#EFECE6;
  --brd:#DDD9D0;--brd2:#C4BEB5;
  --tx:#1A1816;--mu:#6E6860;--fa:#B0A89E;
  --blue:#1A5CA8;--bluebg:#E8F0FB;
  --green:#0D6B4A;--greenbg:#DDF3EA;
  --amber:#9E600A;--amberbg:#FDF2DC;
  --red:#B33030;--redbg:#FAE8E8;
  --r:10px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,0.07);
  --shm:0 4px 20px rgba(0,0,0,0.13);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;min-height:100vh}
.wrap{max-width:940px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:.75rem;flex-wrap:wrap}
.logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--mu);letter-spacing:.1em;cursor:pointer}
.logo:hover{color:var(--tx)}
.nav-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--surf);color:var(--tx);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--brd2)}
.btn.pri{background:var(--tx);color:#fff;border-color:var(--tx)}
.btn.pri:hover{opacity:.87}
.btn.sml{padding:4px 10px;font-size:12px}
.btn.ghost{background:none;color:var(--mu)}
.btn.ghost:hover{color:var(--tx)}
.btn.del{background:none;border:none;color:var(--fa);padding:2px 6px;font-size:13px}
.btn.del:hover{color:var(--red)}
.btn.edt{background:none;border:none;color:var(--mu);padding:2px 8px;font-size:13px}
.btn.edt:hover{color:var(--tx)}
.btn:disabled{opacity:.4;cursor:default}
.home-ttl{font-size:28px;font-weight:600;margin-bottom:.25rem}
.home-sub{font-size:14px;color:var(--mu);margin-bottom:1.75rem}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tcard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1.25rem 1.5rem;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.tcard:hover{border-color:var(--brd2);transform:translateY(-1px);box-shadow:var(--shm)}
.tcard.past{opacity:.55}
.tc-dest{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-family:'DM Mono',monospace}
.tc-name{font-size:16px;font-weight:600;margin-bottom:.25rem}
.tc-dates{font-size:12px;color:var(--mu);margin-bottom:.875rem}
.tc-foot{display:flex;justify-content:space-between;align-items:center}
.tc-chip{font-size:11px;padding:2px 10px;border-radius:100px;background:var(--surf2);color:var(--mu);border:1px solid var(--brd)}
.tc-cd{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.ncard{border:1px dashed var(--brd2);border-radius:var(--r);padding:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;color:var(--mu);min-height:120px;transition:all .15s}
.ncard:hover{border-color:var(--tx);color:var(--tx)}
.hdr{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:1.5rem 1.75rem;margin-bottom:1rem;box-shadow:var(--sh)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.dest-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;font-family:'DM Mono',monospace}
.trip-name{font-size:22px;font-weight:600;line-height:1.2}
.trip-meta{font-size:12px;color:var(--mu);margin-top:4px}
.cdown{text-align:right;flex-shrink:0}
.cdown-n{font-size:40px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.cdown-l{font-size:10px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.travelers{display:flex;gap:5px;margin-top:.875rem;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 11px;background:var(--surf2);border:1px solid var(--brd);border-radius:100px;color:var(--mu)}
.sync-lbl{font-size:11px;font-family:'DM Mono',monospace}
.sync-ok{color:var(--green)}
.sync-err{color:var(--red)}
.sync-go{color:var(--amber)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.875rem 1.125rem;box-shadow:var(--sh)}
.sc-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'DM Mono',monospace}
.sc-n{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.sc-s{font-size:11px;color:var(--mu);margin-top:1px}
.pbar{height:4px;background:var(--surf2);border-radius:100px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:var(--tx);border-radius:100px;transition:width .4s}
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:1.25rem}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:.625rem 1.25rem;font-size:13px;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:-1px;transition:all .15s}
.tab.on{color:var(--tx);border-bottom-color:var(--tx);font-weight:500}
.tab:hover:not(.on){color:var(--tx)}
.dpick{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:1rem;scrollbar-width:none}
.dpick::-webkit-scrollbar{display:none}
.dbt{flex-shrink:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:9px 13px;cursor:pointer;text-align:center;min-width:62px;transition:all .15s}
.dbt:hover{border-color:var(--brd2)}
.dbt.on{background:var(--tx);border-color:var(--tx)}
.dbt .wd{font-size:10px;text-transform:uppercase;color:var(--mu);margin-bottom:2px;font-family:'DM Mono',monospace}
.dbt .dd{font-size:19px;font-weight:600;line-height:1;color:var(--tx)}
.dbt .mo{font-size:10px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.dbt.on .wd,.dbt.on .dd,.dbt.on .mo{color:#fff}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--brd);margin:4px auto 0}
.dbt.on .ddot{background:rgba(255,255,255,.45)}
.sech{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.sech-t{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.fbox{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:1rem 1.125rem;margin-bottom:1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ff{grid-column:1/-1}
.fl{font-size:10px;color:var(--mu);display:block;margin-bottom:3px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--surf);color:var(--tx);width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--tx)}
textarea{resize:vertical}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--tx);flex-shrink:0}
.fa{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.evlist{display:flex;flex-direction:column;gap:7px}
.ev{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh)}
.ev-main{display:flex;gap:12px;padding:.875rem 1.125rem}
.ev-edit{padding:.875rem 1.125rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--r) var(--r)}
.ev-time{font-size:12px;font-weight:500;min-width:40px;text-align:right;font-family:'DM Mono',monospace;padding-top:2px;color:var(--mu)}
.ev-bar{width:3px;border-radius:4px;flex-shrink:0;align-self:stretch;min-height:20px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500;margin-bottom:2px}
.ev-loc{font-size:12px;color:var(--mu)}
.ev-note{font-size:12px;color:var(--mu);margin-top:4px;line-height:1.5;font-style:italic}
.ev-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap}
.ev-cost{font-size:12px;color:var(--mu);font-family:'DM Mono',monospace}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;margin-top:4px;background:var(--bluebg);padding:2px 9px;border-radius:100px;border:1px solid #C5D9F2;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill:hover{opacity:.8}
.empty{text-align:center;padding:3rem 1rem;color:var(--fa);font-size:13px;line-height:2.2}
/* FLIGHT CARD */
.flight-card{background:var(--bluebg);border:1px solid #C5D9F2;border-radius:var(--rs);padding:.625rem .875rem;margin-top:6px}
.fc-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fc-apt{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:var(--blue)}
.fc-arrow{color:var(--fa);font-size:14px}
.fc-times{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px}
.fc-meta{font-size:11px;color:var(--mu);margin-top:2px}
/* LINKED BUDGET CARD */
.lnk-card{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:.625rem .875rem;margin-top:6px}
.lnk-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-bottom:3px}
.lnk-name{font-size:13px;font-weight:500}
.lnk-meta{font-size:11px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
/* BUDGET */
.bsum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.bcat{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:.75rem 1rem;box-shadow:var(--sh);display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
.bcat-n{font-size:11px;color:var(--mu);margin-bottom:1px;font-family:'DM Mono',monospace}
.bcat-c{font-size:10px;color:var(--fa)}
.bcat-u{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.bcat-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.bg-t{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .4rem;font-family:'DM Mono',monospace}
.bi{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:4px;border-left:3px solid transparent;transition:border-color .15s}
.bi.hl{border-left-width:4px;background:#FDFAF5}
.bi-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.bi-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.bi-d{font-size:13px}
.bi-dates{font-size:11px;color:var(--mu);margin-top:1px;font-family:'DM Mono',monospace}
.bi-cancel{font-size:11px;color:var(--amber);margin-top:1px}
.bi-a{text-align:right;flex-shrink:0}
.bi-u{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.bi-e{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace}
.btotal{border-top:1px solid var(--brd);padding-top:1rem;margin-top:1rem;display:flex;justify-content:space-between;align-items:center}
.ck-g{margin-bottom:1.25rem}
.ck-gt{font-size:10px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;display:flex;justify-content:space-between;font-family:'DM Mono',monospace}
.ck-i{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);margin-bottom:3px}
.ck-row{display:flex;align-items:center;gap:10px;padding:.6rem .875rem}
.ck-edit{padding:.75rem .875rem;border-top:1px solid var(--brd);background:var(--surf2);border-radius:0 0 var(--rs) var(--rs)}
.ck-tx{flex:1;font-size:13px}
.ck-done{color:var(--fa);text-decoration:line-through}
.overlay{position:fixed;inset:0;background:rgba(20,18,16,.5);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:2rem 1rem;overflow-y:auto}
.modal{background:var(--surf);border-radius:14px;padding:2rem 2.25rem;max-width:540px;width:100%;box-shadow:var(--shm)}
.modal-t{font-size:18px;font-weight:600;margin-bottom:.25rem}
.modal-s{font-size:13px;color:var(--mu);margin-bottom:1.5rem}
.wdots{display:flex;gap:5px;margin-bottom:1.5rem}
.wdot{height:4px;flex:1;border-radius:100px;background:var(--surf2)}
.wdot.on{background:var(--tx)}
.wlbl{font-size:10px;color:var(--mu);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.mftr{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--brd)}
.fgf{margin-bottom:.875rem}
.tv-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.tv-row{display:flex;gap:6px;align-items:center}
.tv-row input{flex:1}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;font-size:12px;padding:8px 20px;border-radius:100px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;font-family:'DM Mono',monospace;box-shadow:var(--shm)}
.toast.show{opacity:1}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid #ccc;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

.alert-row{display:flex;align-items:center;gap:8px;padding:.5rem .875rem;border-radius:var(--rs);margin-bottom:4px;font-size:12px;font-weight:500}
.al-red{background:var(--redbg);color:var(--red);border:1px solid #F5C0C0}
.al-amber{background:var(--amberbg);color:var(--amber);border:1px solid #F5DBA0}
.paid-chip{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:100px;font-family:'DM Mono',monospace;white-space:nowrap;cursor:pointer;transition:all .15s}
.paid-chip.yes{background:var(--greenbg);color:var(--green);border:1px solid #9FD8BF}
.paid-chip.no{background:var(--surf2);color:var(--mu);border:1px solid var(--brd)}
.curr-toggle{display:flex;border:1px solid var(--brd);border-radius:var(--rs);overflow:hidden}
.curr-btn{background:none;border:none;border-right:1px solid var(--brd);padding:4px 10px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;color:var(--mu)}
.curr-btn:last-child{border-right:none}
.curr-btn.on{background:var(--tx);color:#fff}
.tc-stat{font-size:11px;color:var(--mu);margin-top:4px;font-family:'DM Mono',monospace}
.tc-alert-row{font-size:11px;color:var(--red);margin-top:2px}
.tv-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.tv-head{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;cursor:pointer}
.tv-head:hover{background:var(--surf2)}
.tv-body{padding:1rem;border-top:1px solid var(--brd);background:var(--surf2)}
.bsplit{font-size:11px;margin-top:2px;font-family:'DM Mono',monospace}
.bsplit .pend{color:var(--amber)}
.bsplit .paid{color:var(--green)}
@media(max-width:620px){.sgrid,.bsum{grid-template-columns:1fr 1fr}.fg{grid-template-columns:1fr}.hdr-top,.nav{flex-direction:column}.cdown{text-align:left}.tgrid{grid-template-columns:1fr}}
</style>
</head>

function getTvName(tv){return typeof tv==="string"?tv:(tv&&tv.name?tv.name:"Sin nombre");}
function migrateTv(trip){

}
function daysUntil(d){if(!d)return null;try{return Math.ceil((new Date(d+"T00:00:00")-new Date())/86400000);}catch(e){return null;}}
function buildAlerts(t){
  var out=[];
  (t.budget||[]).forEach(function(b){
    if(!b.cancel)return;
    var d=daysUntil(b.cancel);
    if(d===null)return;
    if(d<0)out.push({lvl:"red",msg:"VENCIDA — Cancel. gratuita: "+esc(b.desc)});
    else if(d<=7)out.push({lvl:"red",msg:"En "+d+" días — Cancel. gratuita: "+esc(b.desc)});
    else if(d<=14)out.push({lvl:"amber",msg:"En "+d+" días — Cancel. gratuita: "+esc(b.desc)});
  });
  (t.travelers||[]).forEach(function(tv){
    if(typeof tv!=="object")return;
    var n=getTvName(tv);
    if(tv.passportExpiry){var d=daysUntil(tv.passportExpiry);if(d!==null){if(d<0)out.push({lvl:"red",msg:"Pasaporte caducado: "+esc(n)});else if(d<=30)out.push({lvl:"red",msg:"Pasaporte caduca en "+d+" días: "+esc(n)});else if(d<=90)out.push({lvl:"amber",msg:"Pasaporte caduca en "+d+" días: "+esc(n)});}}
    if(tv.estaExpiry){var d2=daysUntil(tv.estaExpiry);if(d2!==null){if(d2<0)out.push({lvl:"red",msg:"ESTA caducada: "+esc(n)});else if(d2<=30)out.push({lvl:"red",msg:"ESTA caduca en "+d2+" días: "+esc(n)});else if(d2<=90)out.push({lvl:"amber",msg:"ESTA caduca en "+d2+" días: "+esc(n)});}}
  });
  return out;
}

// SYNC
// SAVE: POST no-cors — datos llegan a Apps Script aunque no leamos respuesta
// LOAD: GET normal — funciona sin CORS issues
function save(){
  localStorage.setItem("tp7_trips",JSON.stringify(trips));
  localStorage.setItem("tp7_id",actId||"");
  if(!SCRIPT_URL)return;
  clearTimeout(syncT);
  syncSt="pending";
  syncT=setTimeout(doSync,2000);
}
function doSync(){
  syncSt="syncing"; render();
  var payload=JSON.stringify({action:"save_trips",trips:trips});
  // POST no-cors: los datos llegan, no podemos leer respuesta — confirmamos con ping GET
  fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:payload})
  .then(function(){
    return fetch(SCRIPT_URL+"?action=ping&t="+Date.now());
  })
  .then(function(r){return r.text();})
  .then(function(){
    lastSync=new Date().toLocaleTimeString("es-ES");
    localStorage.setItem("tp7_ls",lastSync);
    syncSt="ok"; syncErr=""; render();
  })
  .catch(function(err){
    syncSt="err"; syncErr=err.message;
    render();
  });
}
function loadFromSheets(cb){
  var done=false;
  function finish(err){if(done)return;done=true;cb(err);}
  // 6 second timeout — if Sheets doesn't respond, use local data
  var timer=setTimeout(function(){finish("timeout");},6000);
  fetch(SCRIPT_URL+"?action=load&t="+Date.now())
  .then(function(r){return r.text();})
  .then(function(txt){
    clearTimeout(timer);
    var d;
    try{d=JSON.parse(txt);}catch(e){finish("parse error");return;}
    if(d.ok&&Array.isArray(d.trips)){
      var remote=d.trips.filter(function(t){return t.name&&t.startDate;});
      if(remote.length>0){
        var merged=trips.slice();
        remote.forEach(function(rt){
          var found=false;
          for(var i=0;i<merged.length;i++){if(merged[i].id===rt.id){merged[i]=rt;found=true;break;}}
          if(!found)merged.push(rt);
        });
        trips=merged;
        localStorage.setItem("tp7_trips",JSON.stringify(trips));
      }
      finish(null);
    } else {
      finish(d.error||"empty");
    }
  })
  .catch(function(err){clearTimeout(timer);finish(err.message);});
}
function manualSync(){clearTimeout(syncT);doSync();}

// FLIGHT CARD display
function flightCard(ev){
  if(!ev.fromApt&&!ev.flightNum)return"";
  var h='<div class="flight-card"><div class="fc-row">';
  if(ev.fromApt)h+='<span class="fc-apt">'+esc(ev.fromApt)+'</span>';
  h+='<span class="fc-arrow">&#8594;</span>';
  if(ev.toApt)h+='<span class="fc-apt">'+esc(ev.toApt)+'</span>';
  if(ev.flightNum)h+='<span style="font-size:12px;color:var(--mu);font-family:\'DM Mono\',monospace;margin-left:8px">'+esc(ev.flightNum)+'</span>';
  if(ev.airline)h+='<span style="font-size:12px;color:var(--mu)">'+esc(ev.airline)+'</span>';
  h+='</div>';

  if(ev.arrTime){if(times)times+="&nbsp;&nbsp;";times+="Llegada: "+ev.arrTime;if(ev.arrDay&&ev.arrDay!==ev.day)times+=" (+1)";}

  h+='</div>';
  return h;
}

  });
  return h;
}

function rWizard(){
  var dots="";for(var i=0;i<4;i++)dots+='<div class="wdot'+(i<wstep?" on":"")+'"></div>';
  var body="",foot="";
  if(wstep===1){body='<div class="wlbl">Paso 1 de 4 &mdash; Destino</div><div class="fgf"><label class="fl">Nombre del viaje *</label><input id="wn" value="'+esc(wd.name)+'" oninput="wd.name=this.value" placeholder="Verano &middot; Jap&oacute;n 2026"></div><div class="fgf"><label class="fl">Destino principal *</label><input id="wdest" value="'+esc(wd.destination)+'" oninput="wd.destination=this.value" placeholder="Tokio, Jap&oacute;n"></div>';}
  else if(wstep===2){body='<div class="wlbl">Paso 2 de 4 &mdash; Fechas</div><div class="fg"><div><label class="fl">Fecha salida *</label><input type="date" id="ws" value="'+esc(wd.startDate)+'" oninput="wd.startDate=this.value"></div><div><label class="fl">Fecha vuelta *</label><input type="date" id="we" value="'+esc(wd.endDate)+'" oninput="wd.endDate=this.value"></div></div>';}
  else if(wstep===3){var cO="";CURR.forEach(function(c){cO+='<option value="'+c.c+'"'+(wd.currency===c.c?" selected":"")+'>'+c.c+' ('+c.s+')</option>';});var bO="";CURR.forEach(function(c){bO+='<option value="'+c.c+'"'+(wd.exBase===c.c?" selected":"")+'>'+c.c+'</option>';});body='<div class="wlbl">Paso 3 de 4 &mdash; Moneda</div><div class="fg"><div class="ff"><label class="fl">Moneda principal</label><select onchange="wizCS(this.value)">'+cO+'</select></div><div><label class="fl">Moneda referencia</label><select onchange="wd.exBase=this.value">'+bO+'</select></div><div class="ff"><label class="fl">Tipo de cambio (1 '+esc(wd.currency)+' = X '+esc(wd.exBase)+')</label><input type="number" step="0.001" value="'+esc(wd.exRate)+'" oninput="wd.exRate=this.value"></div></div>';}
  else if(wstep===4){var tR="";wd.travelers.forEach(function(v,i){tR+='<div class="tv-row"><input value="'+esc(v)+'" oninput="wd.travelers['+i+']=this.value" placeholder="Nombre del viajero"><button class="btn del" onclick="rmWT('+i+')">&#10005;</button></div>';});body='<div class="wlbl">Paso 4 de 4 &mdash; Viajeros</div><div class="tv-list">'+tR+'</div><button class="btn sml" style="margin-top:8px" onclick="addWT()">+ A&ntilde;adir</button>';}
  else{body='<div style="text-align:center;padding:1.5rem 0"><div style="font-size:40px;margin-bottom:.875rem">&#9992;</div><div style="font-size:17px;font-weight:600;margin-bottom:.5rem">&#161;Viaje creado!</div><div style="font-size:13px;color:var(--mu)">'+esc(wd.name)+' ya aparece en tu lista.</div></div>';}
  foot=wstep<5?'<div class="mftr"><button class="btn" onclick="wizBack()">'+(wstep>1?"&#8592; Atr&aacute;s":"Cancelar")+'</button><button class="btn pri" onclick="wizNext()">'+(wstep===4?"Crear viaje &#10003;":"Siguiente &#8594;")+'</button></div>':'<div class="mftr"><div></div><button class="btn pri" onclick="closeWiz()">Ver el viaje &#8594;</button></div>';
  return '<div class="overlay" onclick="if(event.target===this&&'+wstep+'<5)closeWiz()"><div class="modal"><div class="modal-t">Nuevo viaje</div><div class="modal-s">Configura tu planificador en 4 pasos</div><div class="wdots">'+dots+'</div>'+body+foot+'</div></div>';
}
function wizCS(code){var c=CURR.find(function(x){return x.c===code;});if(c){wd.currency=c.c;wd.csym=c.s;}render();}
function addWT(){wd.travelers.push("");render();}
function rmWT(i){wd.travelers.splice(i,1);render();}

// ACTIONS
function goHome(){actId=null;tab="itinerary";selDay=null;hlBuId=null;addEv=addBu=addCk=false;editEvId=editBuId=editCkId=null;showSet=false;clearTimeout(syncT);rHome();}
function openTrip(id){actId=id;selDay=null;tab="itinerary";localStorage.setItem("tp7_id",id);render();}
function openTripEl(el){var id=el.dataset?el.dataset.id:el.getAttribute("data-id");if(id)openTrip(id);}
function setTab(v){tab=v;addEv=addBu=addCk=false;editEvId=editBuId=editCkId=null;render();}
function pickDay(d){selDay=d;nEv.day=d;render();}
function togEv(){addEv=!addEv;if(addEv){nEv=mkEv();}render();}
function togBu(){addBu=!addBu;if(addBu)nBu={cat:"flights",desc:"",amt:"",cin:"",cout:"",cancel:"",url:"",paid:false};render();}
function togCk(){addCk=!addCk;if(addCk)nCk={grp:"",text:"",url:""};render();}
function cancelE(){editEvId=null;editBuId=null;editCkId=null;render();}

function doAddEv(){if(!nEv.title){toast("Escribe el t\u00EDtulo");return;}var t=T();t.events.push(Object.assign({},nEv,{id:uid(),cost:parseFloat(nEv.cost)||0,day:nEv.day||selDay}));t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);});addEv=false;save();render();toast("Evento a\u00F1adido");}
function delEv(id){if(confirm("\u00BFEliminar este evento?")){var t=T();t.events=t.events.filter(function(e){return e.id!==id;});save();render();}}
function startEEv(id){editEvId=id;editBuId=null;editCkId=null;eBuf=Object.assign({},T().events.find(function(e){return e.id===id;}));render();}
function saveEEv(id){var t=T();t.events=t.events.map(function(e){return e.id===id?Object.assign({},e,eBuf,{cost:parseFloat(eBuf.cost)||0}):e;});t.events.sort(function(a,b){return (a.day+a.time).localeCompare(b.day+b.time);});editEvId=null;save();render();toast("Guardado");}

function doAddBu(){if(!nBu.desc){toast("Escribe la descripci\u00F3n");return;}T().budget.push(Object.assign({},nBu,{id:uid(),amt:parseFloat(nBu.amt)||0}));addBu=false;save();render();toast("Partida a\u00F1adida");}
function delBu(id){if(confirm("\u00BFEliminar esta partida?")){var t=T();t.budget=t.budget.filter(function(b){return b.id!==id;});save();render();}}
function startEBu(id){editBuId=id;editEvId=null;editCkId=null;eBuf=Object.assign({},T().budget.find(function(b){return b.id===id;}));render();}
function saveEBu(id){var t=T();t.budget=t.budget.map(function(b){return b.id===id?Object.assign({},b,eBuf,{amt:parseFloat(eBuf.amt)||0}):b;});editBuId=null;save();render();toast("Guardado");}

function togCkItem(id){var t=T();t.checklist=t.checklist.map(function(c){return c.id===id?Object.assign({},c,{done:!c.done}):c;});save();render();}
function delCk(id){if(confirm("\u00BFEliminar?")){var t=T();t.checklist=t.checklist.filter(function(c){return c.id!==id;});save();render();}}
function doAddCk(){if(!nCk.text){toast("Escribe el elemento");return;}T().checklist.push({id:uid(),grp:nCk.grp||"General",text:nCk.text,done:false,url:nCk.url});addCk=false;save();render();toast("A\u00F1adido");}
function startECk(id){editCkId=id;editEvId=null;editBuId=null;eBuf=Object.assign({},T().checklist.find(function(c){return c.id===id;}));render();}
function saveECk(id){var t=T();t.checklist=t.checklist.map(function(c){return c.id===id?Object.assign({},c,eBuf):c;});editCkId=null;save();render();toast("Guardado");}

function openSet(){var t=T();if(!t)return;migrateTv(t);setBuf={name:t.name,destination:t.destination,startDate:t.startDate,endDate:t.endDate,currency:t.currency||"USD",csym:t.csym||"$",exBase:t.exBase||"EUR",exRate:t.exRate||1,travelers:JSON.parse(JSON.stringify(t.travelers))};openTvIdx=-1;showSet=true;render();}


function togglePaid(id){var t=T();t.budget=t.budget.map(function(b){return b.id===id?Object.assign({},b,{paid:!b.paid}):b;});save();render();}
function togglePaidEl(el){var id=el.getAttribute("data-bid");if(id)togglePaid(id);}
function setShowAlt(v){showAlt=v;render();}
function toggleTvCard(i){openTvIdx=(openTvIdx===i)?-1:i;render();}
function refreshRate(){
  var t=T();if(!t)return;
  rateLoading=true;render();
  fetchRate(t.currency||"USD",t.exBase||"EUR",function(err,rate){
    rateLoading=false;
    if(!err&&rate){setBuf.exRate=Math.round(rate*100000)/100000;toast("Actualizado: 1 "+(t.currency||"USD")+" = "+setBuf.exRate+" "+(t.exBase||"EUR"));}
    else{toast("No se pudo obtener el tipo",3500);}
    render();
  });
}

function openWiz(){wiz=true;wstep=1;wd={name:"",destination:"",startDate:"",endDate:"",currency:"USD",csym:"$",exBase:"EUR",exRate:"1.08",travelers:[""]};render();}
function closeWiz(){wiz=false;if(actId)render();else rHome();}
function wizNext(){
  if(wstep===1){var n=document.getElementById("wn"),d=document.getElementById("wdest");if(n)wd.name=n.value;if(d)wd.destination=d.value;if(!wd.name||!wd.destination){toast("Rellena nombre y destino");return;}}
  if(wstep===2){var s=document.getElementById("ws"),e=document.getElementById("we");if(s)wd.startDate=s.value;if(e)wd.endDate=e.value;if(!wd.startDate||!wd.endDate){toast("Elige las fechas");return;}if(wd.startDate>wd.endDate){toast("La salida debe ser antes");return;}}
  if(wstep===4){var tl=wd.travelers.map(function(s){return s.trim();}).filter(Boolean);if(!tl.length){toast("A\u00F1ade al menos un viajero");return;}var nt={id:uid(),name:wd.name,destination:wd.destination,startDate:wd.startDate,endDate:wd.endDate,currency:wd.currency,csym:wd.csym,exBase:wd.exBase,exRate:parseFloat(wd.exRate)||1,travelers:tl,events:[],budget:[],checklist:[]};trips.push(nt);actId=nt.id;selDay=nt.startDate;tab="itinerary";localStorage.setItem("tp7_trips",JSON.stringify(trips));localStorage.setItem("tp7_id",actId);}
  wstep++;render();
}
function wizBack(){wstep>1?wstep--:closeWiz();render();}

var _g=[goHome,openTrip,openTripEl,togglePaidEl,setTab,pickDay,togEv,togBu,togCk,cancelE,doAddEv,delEv,startEEv,saveEEv,doAddBu,delBu,startEBu,saveEBu,togCkItem,delCk,doAddCk,startECk,saveECk,openSet,closeSet,saveSet,delTrip,setCS,addSetTv,rmSetTv,openWiz,closeWiz,wizNext,wizBack,wizCS,addWT,rmWT,viewBudgetItem];
_g.forEach(function(f){window[f.name]=f;});
window.manualSync=manualSync;
window.togglePaid=togglePaid;window.setShowAlt=setShowAlt;window.toggleTvCard=toggleTvCard;window.refreshRate=refreshRate;
window.nEv=nEv;window.nBu=nBu;window.nCk=nCk;window.eBuf=eBuf;window.wd=wd;window.setBuf=setBuf;

// INIT: load from Sheets for cross-device sync, then render
// Remove invalid trips (no name or no startDate — e.g. test data)
trips=trips.filter(function(t){return t.name&&t.startDate;});
// If nothing valid left, restore demo
if(trips.length===0){
  trips=[JSON.parse(JSON.stringify(DEMO))];
  localStorage.setItem("tp7_trips",JSON.stringify(trips));
  actId=null;
}
trips=trips.filter(function(t){return t.name&&t.startDate;});
if(trips.length===0){trips=[JSON.parse(JSON.stringify(DEMO))];localStorage.setItem("tp7_trips",JSON.stringify(trips));actId=null;}
if(actId&&!trips.find(function(t){return t.id===actId;}))actId=null;
// Always start at home screen so user picks the trip
actId=null;
rHome();
// Then sync in background
if(SCRIPT_URL){
  syncSt="pending";
  loadFromSheets(function(err){
    trips=trips.filter(function(t){return t.name&&t.startDate;});
    if(trips.length===0){trips=[JSON.parse(JSON.stringify(DEMO))];localStorage.setItem("tp7_trips",JSON.stringify(trips));}
    if(!err){
      syncSt="ok";lastSync=new Date().toLocaleTimeString("es-ES");
      localStorage.setItem("tp7_ls",lastSync);
    } else {
      syncSt=(err==="timeout"||err==="empty")?"idle":"err";
      syncErr=(err==="timeout"||err==="empty")?"":err;
    }
    if(actId&&!trips.find(function(t){return t.id===actId;}))actId=null;
    if(actId)render();else rHome();
  });
}
</script>
<div id="pw-overlay" style="position:fixed;inset:0;background:#F6F4EF;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1.5rem;font-family:'DM Sans',sans-serif">
  <div style="text-align:center"><div style="font-size:32px;margin-bottom:.5rem">&#9992;</div><div style="font-size:18px;font-weight:600;color:#1A1816;margin-bottom:.25rem">Travel Planner</div><div style="font-size:13px;color:#6E6860">Introduce la contrase&ntilde;a para continuar</div></div>
  <div style="display:flex;gap:8px;align-items:center">
    <input id="pw-input" type="password" placeholder="Contrase&ntilde;a" maxlength="20" style="font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 16px;border:1px solid #DDD9D0;border-radius:8px;outline:none;width:200px;text-align:center;background:#fff;color:#1A1816" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()" style="font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;background:#1A1816;color:#fff;border:none;border-radius:8px;cursor:pointer">Entrar</button>
  </div>
  <div id="pw-err" style="font-size:12px;color:#B33030;display:none">Contrase&ntilde;a incorrecta</div>
</div>
<script>
(function(){if(sessionStorage.getItem("tp7_auth")==="1")document.getElementById("pw-overlay").style.display="none";})();
